name: Security Audit

on:
  push:
    branches: [main, master]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
  schedule:
    # 每月 1 号 UTC 00:00 运行
    - cron: '0 0 1 * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 使用 rustsec/audit-check 进行快速安全审计
  security-audit:
    name: Security Audit (rustsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # 详细的 cargo audit 检查（含 JSON 输出和 Markdown 报告）
  detailed-audit:
    name: Detailed Security Audit
    runs-on: ubuntu-latest
    outputs:
      vuln_count: ${{ steps.audit.outputs.vuln_count }}
      has_critical: ${{ steps.audit.outputs.has_critical }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run detailed audit
        id: audit
        run: |
          mkdir -p reports
          REPORT_FILE="reports/security-audit-$(date +%Y%m).md"
          JSON_FILE="reports/security-audit-$(date +%Y%m).json"
          
          echo "# 🔒 安全审计月度报告" > "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "> **生成时间:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$REPORT_FILE"
          echo "> **项目:** ${{ github.repository }}" >> "$REPORT_FILE"
          echo "> **分支:** ${{ github.ref_name }}" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          # JSON 输出用于后续处理
          cargo audit --json > "$JSON_FILE" 2>/dev/null || true
          
          # Markdown 报告
          echo "## 漏洞详情" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          VULN_COUNT=0
          HAS_CRITICAL=false
          
          if command -v jq >/dev/null 2>&1; then
            VULN_COUNT=$(jq '.vulnerabilities.count // 0' "$JSON_FILE")
            echo "vuln_count=${VULN_COUNT}" >> $GITHUB_OUTPUT
            
            if [ "$VULN_COUNT" -gt 0 ]; then
              # 检查是否有高危漏洞
              CRITICAL_COUNT=$(jq '[.vulnerabilities.list[] | select(.advisory.severity == "critical")] | length' "$JSON_FILE" 2>/dev/null || echo 0)
              HIGH_COUNT=$(jq '[.vulnerabilities.list[] | select(.advisory.severity == "high")] | length' "$JSON_FILE" 2>/dev/null || echo 0)
              
              if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
                HAS_CRITICAL=true
                echo "has_critical=true" >> $GITHUB_OUTPUT
              else
                echo "has_critical=false" >> $GITHUB_OUTPUT
              fi
              
              echo "发现 **${VULN_COUNT}** 个安全漏洞：" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              echo "| 包名 | 漏洞 ID | 严重程度 | 标题 |" >> "$REPORT_FILE"
              echo "|------|---------|----------|------|" >> "$REPORT_FILE"
              
              jq -r '.vulnerabilities.list[] | "| \(.advisory.package) | \(.advisory.id) | \(.advisory.severity // "unknown") | \(.advisory.title) |"' "$JSON_FILE" >> "$REPORT_FILE" 2>/dev/null || true
            else
              echo "✅ 未发现安全漏洞。" >> "$REPORT_FILE"
              echo "vuln_count=0" >> $GITHUB_OUTPUT
              echo "has_critical=false" >> $GITHUB_OUTPUT
            fi
          else
            # 无 jq 时降级处理
            if cargo audit --format=markdown >> "$REPORT_FILE" 2>/dev/null; then
              echo "vuln_count=0" >> $GITHUB_OUTPUT
              echo "has_critical=false" >> $GITHUB_OUTPUT
            else
              echo "⚠️ 检测到潜在问题（详见上文）。" >> "$REPORT_FILE"
              echo "vuln_count=1" >> $GITHUB_OUTPUT
              echo "has_critical=true" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "" >> "$REPORT_FILE"
          cat "$REPORT_FILE"

      - name: Check for yanked crates
        run: |
          REPORT_FILE="reports/security-audit-$(date +%Y%m).md"
          echo "## Yanked Crates" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          
          YANKED_FILE="reports/yanked-$(date +%Y%m).md"
          if cargo audit --deny=yanked > "$YANKED_FILE" 2>&1; then
            echo "✅ 未发现被 yanked 的 crate。" >> "$REPORT_FILE"
          else
            echo "⚠️ 发现被 yanked 的 crate：" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            cat "$YANKED_FILE" >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
          fi
          echo "" >> "$REPORT_FILE"
          cat "$REPORT_FILE"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: reports/security-audit-*.md
          retention-days: 90

  # cargo-deny 供应链安全检查
  cargo-deny:
    name: cargo-deny Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny (advisories)
        run: cargo deny check advisories

      - name: Run cargo-deny (licenses)
        run: cargo deny check licenses

      - name: Run cargo-deny (bans)
        run: cargo deny check bans

      - name: Run cargo-deny (sources)
        run: cargo deny check sources

  # 许可证合规性检查
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny check licenses 2>&1 | tee reports/license_report_$(date +%Y%m).txt || true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-check-report
          path: reports/license_report_*.txt
          retention-days: 90

  # 发现高危漏洞时自动创建 Issue 并 @ 维护者
  create-security-issue:
    name: Create Security Issue
    runs-on: ubuntu-latest
    needs: [security-audit, detailed-audit, cargo-deny]
    # 仅在定时触发时且发现高危漏洞时创建 Issue
    if: github.event_name == 'schedule' && needs.detailed-audit.outputs.has_critical == 'true'
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create security issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // 读取最新的审计报告
            const reportsDir = 'reports';
            let reportBody = '';
            if (fs.existsSync(reportsDir)) {
              const files = fs.readdirSync(reportsDir)
                .filter(f => f.startsWith('security-audit-') && f.endsWith('.md'))
                .sort()
                .reverse();
              if (files.length > 0) {
                reportBody = fs.readFileSync(path.join(reportsDir, files[0]), 'utf8');
              }
            }
            
            const title = '🚨【高危】月度安全审计发现严重漏洞';
            const body = `## 🚨 安全漏洞警报
            
            月度安全审计检测到 **高危或严重级别** 的安全漏洞，需要立即处理。
            
            ### 漏洞统计
            - **漏洞总数:** ${{ needs.detailed-audit.outputs.vuln_count }}
            - **高危/严重:** 存在
            
            ### 详细报告
            ${reportBody || '报告文件未找到，请查看工作流产物。'}
            
            ### 紧急行动项
            1. ⚠️ **立即** 审查受影响依赖的安全公告
            2. 🔄 更新受影响的依赖到修复版本
            3. ✅ 运行 \`cargo audit\` 本地验证修复
            4. 🧪 运行完整测试套件确保兼容性
            5. 📝 更新 CHANGELOG.md 记录安全修复
            
            ### 工作流信息
            - 触发时间: ${{ github.event.schedule || '手动触发' }}
            - 运行链接: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ---
            *此 issue 由 Security Audit 工作流自动生成。*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'vulnerability', 'automated', 'critical'],
              assignees: ['${{ github.repository_owner }}']
            });

  # 安全审计状态汇总
  audit-summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [security-audit, detailed-audit, cargo-deny, license-check]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# 🔒 安全审计结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **运行类型:** ${{ github.event_name == 'schedule' && '月度定时审计' || 'CI 触发审计' }}" >> $GITHUB_STEP_SUMMARY
          echo "> **运行时间:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| rustsec/audit-check | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 详细审计 | ${{ needs.detailed-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cargo-deny | ${{ needs.cargo-deny.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 许可证检查 | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detailed-audit.outputs.has_critical }}" == "true" ]; then
            echo "🔴 **检测到高危安全漏洞！已自动创建 issue 并通知维护者。**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**请务必在 48 小时内处理。**" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ needs.security-audit.result }}" != "success" ] || [ "${{ needs.cargo-deny.result }}" != "success" ]; then
            echo "⚠️ 安全检查结果未通过，请查看详情。" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ 所有安全检查通过" >> $GITHUB_STEP_SUMMARY
          fi
