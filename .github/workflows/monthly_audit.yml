name: Monthly Knowledge Base Audit

on:
  schedule:
    # 每月 1 日 UTC 00:00 运行
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
      
      - name: Run KB quality audit
        run: |
          python scripts/kb_auditor.py
        continue-on-error: true
      
      - name: Run content overlap detection
        run: |
          python scripts/detect_content_overlap.py
        continue-on-error: true
      
      - name: Run code block compiler check
        run: |
          python scripts/code_block_compiler.py
        continue-on-error: false
      
      - name: Run concept audit
        run: |
          python scripts/concept_audit.py
        continue-on-error: true
      
      - name: Run cross concept diff
        run: |
          python scripts/cross_concept_diff.py
        continue-on-error: true
      
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            reports/kb_quality_dashboard.md
            reports/CONTENT_OVERLAP_DETECTION_*.md
            reports/code_block_compile_report.md
            reports/concept_audit_report.md
            reports/cross_concept_diff_report.md
      
      - name: Check for failures
        run: |
          if grep -q "死链数量 | [1-9]" reports/kb_quality_dashboard.md 2>/dev/null; then
            echo "⚠️ 发现死链，请检查 reports/kb_quality_dashboard.md"
          fi
          if [ -f reports/kb_quality_dashboard.md ]; then
            echo "✅ KB quality audit completed"
          fi
          if [ -f reports/CONTENT_OVERLAP_DETECTION_$(date +%Y_%m_%d).md ]; then
            echo "✅ Content overlap detection completed"
          fi
          if [ -f reports/code_block_compile_report.md ]; then
            echo "✅ Code block compile check completed"
          fi
          if [ -f reports/concept_audit_report.md ]; then
            echo "✅ Concept audit completed"
          fi
          if [ -f reports/cross_concept_diff_report.md ]; then
            echo "✅ Cross concept diff completed"
          fi
