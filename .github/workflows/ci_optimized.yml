# ⚠️ DEPRECATED (2026-07-12)：与 ci.yml 真重复，保留 ci.yml 为准。
# 本工作流的 fmt/clippy/test/doc 与 ci.yml 在每次 PR 上重复运行；miri/bench 已由
# miri.yml / performance.yml 专职覆盖。唯一独有价值是多 OS 测试矩阵
# （ubuntu/windows/macos），后续应迁入 ci.yml 后删除本文件。
# 调度已移除，仅保留 workflow_dispatch 手动触发，避免重复消耗 CI 额度。
name: CI Optimized (DEPRECATED — use ci.yml)

on:
  # push/pull_request 触发已停用（与 ci.yml 重复）；仅手动触发
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.0"
  CARGO_INCREMENTAL: 1
  CARGO_NET_RETRY: 10
  # stable 主矩阵保留 tokio_unstable；nightly-only 预览模块在 Miri/nightly 任务中测试
  RUSTFLAGS: "-D warnings --cfg tokio_unstable"
  RUSTUP_MAX_RETRIES: 10
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # 代码质量检查
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # 测试
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test
        run: cargo test --workspace --all-features

  # Miri检查 (Tree Borrows)
  miri:
    name: Miri (Tree Borrows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup Miri
        run: cargo miri setup

      - name: Run Miri
        run: cargo miri test --workspace --all-features
        env:
          MIRIFLAGS: "-Zmiri-tree-borrows -Zmiri-ignore-leaks"

  # 文档构建
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Build docs
        run: cargo doc --workspace --no-deps --all-features

  # 基准测试
  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Run benchmarks
        run: cargo bench --workspace -- --test
