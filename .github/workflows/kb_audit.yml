name: Knowledge Base Audit

on:
  push:
    branches: [main, master]
    paths:
      - 'concept/**'
      - 'scripts/kb_auditor.py'
  pull_request:
    branches: [main, master]
    paths:
      - 'concept/**'
      - 'scripts/kb_auditor.py'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run KB Auditor
        id: audit
        run: |
          python scripts/kb_auditor.py
          echo "=== AUDIT SUMMARY ==="
          cat reports/kb_quality_dashboard.md | head -40
        continue-on-error: true

      - name: Check for dead links
        run: |
          DEAD_LINKS=$(grep -c "死链数量.*0.*✅" reports/kb_quality_dashboard.md || true)
          if [ "$DEAD_LINKS" -eq 0 ]; then
            echo "❌ Dead links found!"
            grep -A5 "死链" reports/kb_quality_dashboard.md || true
            exit 1
          fi
          echo "✅ No dead links"

      - name: Check risk files
        run: |
          RISK_COUNT=$(python3 -c "
import re
with open('reports/kb_quality_dashboard.md', 'r', encoding='utf-8') as f:
    content = f.read()
m = re.search(r'## 风险文件\n\n(.*?)\n\n##', content, re.DOTALL)
if m:
    lines = [l for l in m.group(1).split('\n') if 'L0' not in l and '|' in l and 'concept' in l]
    print(len(lines))
else:
    print(0)
")
          if [ "$RISK_COUNT" -gt 0 ]; then
            echo "❌ Found $RISK_COUNT non-L0 risk files!"
            exit 1
          fi
          echo "✅ No risk files"

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-quality-dashboard
          path: reports/kb_quality_dashboard.md

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dashboard = fs.readFileSync('reports/kb_quality_dashboard.md', 'utf8');
            const summary = dashboard.split('## 全局指标')[1]?.split('##')[0] || dashboard.slice(0, 500);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 KB Audit Results\n\n${summary}\n\n[View full dashboard](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${context.sha}/reports/kb_quality_dashboard.md)`
            });
