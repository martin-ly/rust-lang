name: Nightly Quality Report

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 / 北京时间 10:00
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  quality-report:
    name: Generate Nightly Quality Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nightly-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Install mdbook
        run: cargo install mdbook --locked

      # 与 scripts/run_quality_gates.sh 对齐：23 阻断门 + 0 语义观察门（观察机制保留，当前无观察门）。
      # 任一阻断门失败才创建 issue。
      - name: Run all quality gates
        id: gates
        continue-on-error: true
        run: |
          set +e
          # --- 10 基础阻断门 ---
          echo "cargo_check="$(cargo check --workspace >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_test="$(cargo test --workspace --quiet >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_clippy="$(cargo clippy --workspace -- -D warnings >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_audit="$(cargo audit --no-fetch >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_vet="$(cargo vet --locked >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "mdbook_build="$(mdbook build >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "kb_auditor="$(python scripts/kb_auditor.py --link-check >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "overlap="$(python scripts/detect_content_overlap.py >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "i18n="$(python scripts/add_bilingual_annotations.py --mode check-only >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "mermaid="$(python scripts/check_mermaid_syntax.py >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          # --- 9 已转正阻断门（--strict / actionable=0，AGENTS.md §5.2） ---
          echo "topology="$(python scripts/check_topology_quality.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "kg_shapes="$(python scripts/check_kg_shapes.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "canonical_uniqueness="$(python scripts/check_canonical_uniqueness.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "concept_consistency="$(python scripts/concept_consistency_auditor.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          # --- 2026-07-14 转阻断（S3，AGENTS.md §5.2） ---
          echo "authority_coverage="$(python scripts/check_concept_authority_coverage.py --strict --include-crates >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "quiz="$(python scripts/check_quiz_system.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "naming="$(python scripts/check_naming_convention.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          cargo fetch --locked --manifest-path examples/examples_check/Cargo.toml >/dev/null 2>&1
          echo "examples_compile="$(python scripts/check_examples_compile.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          # --- overlap v2 已转正阻断（2026-07-12，AGENTS.md §5.2）：可处理项基线 0 ---
          python scripts/detect_content_overlap_v2.py --budget 999999 >/dev/null 2>&1
          python scripts/triage_overlap.py >/dev/null 2>&1
          ACTIONABLE=$(python -c "import glob,json; s=json.load(open(sorted(glob.glob('reports/OVERLAP_TRIAGE_*.json'))[-1],encoding='utf-8'))['summary']; print(s.get('MERGE',0)+s.get('DOCS_INTERNAL',0))")
          echo "overlap_v2_actionable=$ACTIONABLE" >> $GITHUB_OUTPUT
          if [ "$ACTIONABLE" -gt 0 ]; then echo "overlap_v2=failed" >> $GITHUB_OUTPUT; else echo "overlap_v2=passed" >> $GITHUB_OUTPUT; fi
          # --- 2026-07-14 转阻断（用户指示全部转阻断，--strict 实跑 exit=0，见 reports/GATE_FULL_BLOCKING_U1_2026_07_14.md） ---
          echo "metadata="$(python scripts/check_metadata_consistency.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "semantic_health="$(python scripts/semantic_health.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "code_blocks="$(python scripts/check_concept_code_blocks.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "mindmap="$(python scripts/check_mindmap_coverage.py --strict >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          # --- 语义观察门（continue-on-error，不触发 issue） ---
          # 观察门机制保留（AGENTS.md §5.2）：当前 0 个观察门。

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-reports
          path: |
            reports/kb_quality_dashboard.md
            reports/CONTENT_OVERLAP_DETECTION_*.md
            reports/CONTENT_OVERLAP_V2_*.md
            reports/OVERLAP_TRIAGE_*.md
            reports/METADATA_CONSISTENCY_BASELINE_*.md
            reports/TOPOLOGY_QUALITY_*.md
            reports/KG_SHAPES_VALIDATION_*.md
            reports/SEMANTIC_HEALTH_*.md
            reports/CONCEPT_AUTHORITY_COVERAGE_*.md
            reports/CANONICAL_UNIQUENESS_*.md
            reports/CONCEPT_CONSISTENCY_AUDIT_*.md
            reports/internal_link_check_report.md
          retention-days: 7

      - name: Create issue on failure
        if: steps.gates.outputs.cargo_check == 'failed' || steps.gates.outputs.cargo_test == 'failed' || steps.gates.outputs.cargo_clippy == 'failed' || steps.gates.outputs.cargo_audit == 'failed' || steps.gates.outputs.cargo_vet == 'failed' || steps.gates.outputs.mdbook_build == 'failed' || steps.gates.outputs.kb_auditor == 'failed' || steps.gates.outputs.overlap == 'failed' || steps.gates.outputs.i18n == 'failed' || steps.gates.outputs.mermaid == 'failed' || steps.gates.outputs.topology == 'failed' || steps.gates.outputs.kg_shapes == 'failed' || steps.gates.outputs.canonical_uniqueness == 'failed' || steps.gates.outputs.concept_consistency == 'failed' || steps.gates.outputs.overlap_v2 == 'failed' || steps.gates.outputs.authority_coverage == 'failed' || steps.gates.outputs.quiz == 'failed' || steps.gates.outputs.naming == 'failed' || steps.gates.outputs.examples_compile == 'failed' || steps.gates.outputs.metadata == 'failed' || steps.gates.outputs.semantic_health == 'failed' || steps.gates.outputs.code_blocks == 'failed' || steps.gates.outputs.mindmap == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Cargo Check': '${{ steps.gates.outputs.cargo_check }}',
              'Cargo Test': '${{ steps.gates.outputs.cargo_test }}',
              'Cargo Clippy': '${{ steps.gates.outputs.cargo_clippy }}',
              'Cargo Audit': '${{ steps.gates.outputs.cargo_audit }}',
              'Cargo Vet': '${{ steps.gates.outputs.cargo_vet }}',
              'mdbook Build': '${{ steps.gates.outputs.mdbook_build }}',
              'KB Auditor': '${{ steps.gates.outputs.kb_auditor }}',
              'Content Overlap': '${{ steps.gates.outputs.overlap }}',
              'i18n Terms': '${{ steps.gates.outputs.i18n }}',
              'Mermaid Syntax': '${{ steps.gates.outputs.mermaid }}',
              'Topology Quality (strict)': '${{ steps.gates.outputs.topology }}',
              'KG SHACL (strict)': '${{ steps.gates.outputs.kg_shapes }}',
              'Canonical Uniqueness (strict)': '${{ steps.gates.outputs.canonical_uniqueness }}',
              'Concept Consistency (strict)': '${{ steps.gates.outputs.concept_consistency }}',
              'Metadata Consistency (strict)': '${{ steps.gates.outputs.metadata }}',
              'Content Overlap v2 (strict, actionable=${{ steps.gates.outputs.overlap_v2_actionable }})': '${{ steps.gates.outputs.overlap_v2 }}',
              'Semantic Health (strict)': '${{ steps.gates.outputs.semantic_health }}',
              'Authority Coverage (strict)': '${{ steps.gates.outputs.authority_coverage }}',
              'Quiz System (strict)': '${{ steps.gates.outputs.quiz }}',
              'Naming Convention (strict)': '${{ steps.gates.outputs.naming }}',
              'Examples Compile (strict)': '${{ steps.gates.outputs.examples_compile }}',
              'Concept Code Blocks (strict)': '${{ steps.gates.outputs.code_blocks }}',
              'Mindmap Coverage (strict)': '${{ steps.gates.outputs.mindmap }}'
            };
            const summary = Object.entries(jobs)
              .map(([name, result]) => `- ${result === 'passed' ? '✅' : result === 'warn' ? '⚠️' : '❌'} ${name}`)
              .join('\n');
            const body = `## ❌ Nightly Quality Gates Failed\n\n${summary}\n\n---\n*Workflow: .github/workflows/nightly_quality_report.yml*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Nightly quality gates failed — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['quality gates', 'automated', 'nightly']
            });
