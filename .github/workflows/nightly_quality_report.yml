name: Nightly Quality Report

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 / 北京时间 10:00
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  quality-report:
    name: Generate Nightly Quality Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nightly-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Install mdbook
        run: cargo install mdbook --locked

      - name: Run all quality gates
        id: gates
        continue-on-error: true
        run: |
          set +e
          echo "cargo_check="$(cargo check --workspace >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_test="$(cargo test --workspace --quiet >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_clippy="$(cargo clippy --workspace -- -D warnings >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_audit="$(cargo audit --no-fetch >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "cargo_vet="$(cargo vet --locked >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "mdbook_build="$(mdbook build >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "kb_auditor="$(python scripts/kb_auditor.py --link-check >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "overlap="$(python scripts/detect_content_overlap.py >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT
          echo "i18n="$(python scripts/add_bilingual_annotations.py --mode check-only >/dev/null 2>&1 && echo "passed" || echo "failed") >> $GITHUB_OUTPUT

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-reports
          path: |
            reports/kb_quality_dashboard.md
            reports/CONTENT_OVERLAP_DETECTION_*.md
            reports/internal_link_check_report.md
          retention-days: 7

      - name: Create issue on failure
        if: steps.gates.outputs.cargo_check == 'failed' || steps.gates.outputs.cargo_test == 'failed' || steps.gates.outputs.cargo_clippy == 'failed' || steps.gates.outputs.cargo_audit == 'failed' || steps.gates.outputs.cargo_vet == 'failed' || steps.gates.outputs.mdbook_build == 'failed' || steps.gates.outputs.kb_auditor == 'failed' || steps.gates.outputs.overlap == 'failed' || steps.gates.outputs.i18n == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Cargo Check': '${{ steps.gates.outputs.cargo_check }}',
              'Cargo Test': '${{ steps.gates.outputs.cargo_test }}',
              'Cargo Clippy': '${{ steps.gates.outputs.cargo_clippy }}',
              'Cargo Audit': '${{ steps.gates.outputs.cargo_audit }}',
              'Cargo Vet': '${{ steps.gates.outputs.cargo_vet }}',
              'mdbook Build': '${{ steps.gates.outputs.mdbook_build }}',
              'KB Auditor': '${{ steps.gates.outputs.kb_auditor }}',
              'Content Overlap': '${{ steps.gates.outputs.overlap }}',
              'i18n Terms': '${{ steps.gates.outputs.i18n }}'
            };
            const summary = Object.entries(jobs)
              .map(([name, result]) => `- ${result === 'passed' ? '✅' : '❌'} ${name}`)
              .join('\n');
            const body = `## ❌ Nightly Quality Gates Failed\n\n${summary}\n\n---\n*Workflow: .github/workflows/nightly_quality_report.yml*`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Nightly quality gates failed — ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['quality gates', 'automated', 'nightly']
            });
