name: Link Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行
  workflow_dispatch:

jobs:
  # Markdown 链接检查
  check-markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --exclude-path docs/archive/
            --exclude-path docs/backup/
            --exclude-path docs/2026_03_reorganization/
            --exclude "https://spec.ferrocene.dev/*"
            --exclude "file:///*"
            --exclude "http://localhost:*"
            --exclude "https://localhost:*"
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            docs/
            README.md
            CHANGELOG.md
            CONTRIBUTING.md
            FAQ.md
          fail: false

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: ./lychee/out.md
          retention-days: 30

      - name: Create issue for broken links
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken Links Detected"
          content-filepath: ./lychee/out.md
          labels: "documentation, automated, links"

  # 检查内部链接
  check-internal-links:
    name: Check Internal Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run internal link checker
        run: |
          cd ${{ github.workspace }}
          python scripts/check_links.py

      - name: Upload internal link check report
        uses: actions/upload-artifact@v4
        with:
          name: internal-link-check-report
          path: reports/internal_link_check_report.md
          retention-days: 30

      - name: Check for broken links
        run: |
          broken=$(grep "损坏链接:" reports/internal_link_check_report.md | grep -oE '[0-9]+' | head -1)
          echo "Broken links: $broken"
          if [ "$broken" -gt 0 ]; then
            echo "❌ Found broken internal links: $broken"
            exit 1
          fi
