name: Weekly Dependency Update

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一 UTC 00:00 运行
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-

      - name: Update dependencies
        id: update
        run: |
          # 备份当前的 Cargo.lock
          cp Cargo.lock Cargo.lock.backup
          
          # 更新依赖
          cargo update
          
          # 检查是否有变化
          if diff -q Cargo.lock Cargo.lock.backup > /dev/null 2>&1; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No dependency updates available"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Dependencies updated"
            
            # 生成更新摘要
            echo "### Dependency Updates Summary" > update_summary.md
            echo "" >> update_summary.md
            cargo update --dry-run 2>&1 | grep -E "(Updating|Adding|Removing)" >> update_summary.md || true
          fi
          
          # 清理备份
          rm -f Cargo.lock.backup

      - name: Run tests
        if: steps.update.outputs.changes == 'true'
        run: cargo test --workspace --all-features --verbose

      - name: Run clippy
        if: steps.update.outputs.changes == 'true'
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Build documentation
        if: steps.update.outputs.changes == 'true'
        run: cargo doc --workspace --no-deps --all-features

      - name: Create Pull Request
        if: steps.update.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "📦 Weekly Dependency Update"
          body: |
            ## Automated Dependency Update
            
            This PR updates project dependencies to their latest compatible versions.
            
            ### Changes
            - Updated dependencies in `Cargo.lock`
            
            ### Verification
            - [x] All tests pass
            - [x] Clippy checks pass
            - [x] Documentation builds successfully
            
            ### Summary
            ${{ steps.update.outputs.changes == 'true' && 'Dependencies were updated. See commit diff for details.' || 'No changes needed.' }}
            
            ---
            *This PR was automatically generated by the Weekly Dependency Update workflow.*
          branch: chore/weekly-dependency-update
          delete-branch: true
          labels: |
            dependencies
            automated
          assignees: ${{ github.actor }}

      - name: Upload update summary
        if: steps.update.outputs.changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-update-summary
          path: update_summary.md
          retention-days: 7

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Install cargo-outdated
        run: cargo install cargo-outdated --locked

      - name: Check outdated dependencies
        run: |
          echo "## Outdated Dependencies" > outdated_report.md
          echo "" >> outdated_report.md
          cargo outdated --root-deps-only --format compact >> outdated_report.md 2>&1 || true
          cat outdated_report.md

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies-report
          path: outdated_report.md
          retention-days: 30
