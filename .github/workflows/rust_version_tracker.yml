name: Rust Version Tracker

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1日运行
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  check-rust-versions:
    name: Check Rust Versions
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest Rust versions
        id: check-versions
        run: |
          # 获取最新稳定版
          STABLE=$(curl -s https://api.github.com/repos/rust-lang/rust/releases/latest | jq -r '.tag_name')
          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          
          # 获取当前项目版本
          CURRENT=$(grep "rust-version" Cargo.toml | head -1 | cut -d'"' -f2)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          
          # 获取最新的 nightly 版本
          NIGHTLY=$(curl -s https://api.github.com/repos/rust-lang/rust/releases/tags/nightly | jq -r '.tag_name' 2>/dev/null || echo "nightly")
          echo "nightly=$NIGHTLY" >> $GITHUB_OUTPUT
          
          if [ "$STABLE" != "$CURRENT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: $STABLE (current: $CURRENT)"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Rust version is up to date: $CURRENT"
          fi

      - name: Generate update report
        if: steps.check-versions.outputs.update_needed == 'true'
        run: |
          cat > version_update_report.md << 'EOF'
          ## Rust 版本更新报告
          
          ### 版本信息
          - **当前版本:** ${{ steps.check-versions.outputs.current }}
          - **最新稳定版:** ${{ steps.check-versions.outputs.stable }}
          - **Nightly:** ${{ steps.check-versions.outputs.nightly }}
          
          ### 更新步骤
          1. 阅读 [Release Notes](https://github.com/rust-lang/rust/releases/tag/${{ steps.check-versions.outputs.stable }})
          2. 更新 `Cargo.toml` 中的 `rust-version`
          3. 更新 CI 配置文件中的 Rust 版本
          4. 测试所有代码示例
          5. 更新 CHANGELOG.md
          
          ### 相关链接
          - [Rust 发布说明](https://github.com/rust-lang/rust/releases/tag/${{ steps.check-versions.outputs.stable }})
          - [Rust 博客](https://blog.rust-lang.org/)
          EOF

      - name: Create update issue
        if: steps.check-versions.outputs.update_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('version_update_report.md', 'utf8');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Rust 版本更新: ${{ steps.check-versions.outputs.stable }}`,
              body: report,
              labels: ['version-update', 'automated', 'enhancement']
            });

      - name: Update knowledge base
        if: steps.check-versions.outputs.update_needed == 'true'
        run: |
          mkdir -p knowledge/99_archive
          cat >> knowledge/99_archive/VERSION_TRACKING.md << EOF
          
          ## 检测到新版本 - $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          - **最新稳定版:** ${{ steps.check-versions.outputs.stable }}
          - **当前项目版本:** ${{ steps.check-versions.outputs.current }}
          
          ### 需要执行的操作
          1. 阅读 [Release Notes](https://github.com/rust-lang/rust/releases/tag/${{ steps.check-versions.outputs.stable }})
          2. 识别新特性
          3. 创建对应文档
          4. 更新 Cargo.toml
          5. 测试所有代码示例
          
          EOF

      - name: Upload version check report
        uses: actions/upload-artifact@v4
        with:
          name: version-check-report
          path: |
            version_update_report.md
            knowledge/99_archive/VERSION_TRACKING.md
          retention-days: 90

      - name: Summary
        run: |
          echo "## Rust Version Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Current:** ${{ steps.check-versions.outputs.current }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Latest Stable:** ${{ steps.check-versions.outputs.stable }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Needed:** ${{ steps.check-versions.outputs.update_needed }}" >> $GITHUB_STEP_SUMMARY
