name: PR Checks

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUSTFLAGS: "-D warnings"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # 代码格式检查
  fmt:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Clippy 检查
  clippy:
    name: Clippy Linting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - { args: "--all-targets --all-features", name: "All Targets" }
          - { args: "--workspace -- -W clippy::pedantic", name: "Pedantic" }
          - { args: "--workspace -- -W clippy::nursery", name: "Nursery" }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy (${{ matrix.checks.name }})
        run: cargo clippy ${{ matrix.checks.args }}
        continue-on-error: ${{ matrix.checks.name != 'All Targets' }}

  # 测试套件
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, nightly]
        exclude:
          # 减少矩阵大小：Windows 和 macOS 只测试 stable
          - os: windows-latest
            rust: nightly
          - os: macos-latest
            rust: nightly
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust }}-cargo-test-

      - name: Build
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features --verbose

  # 测试覆盖率
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --workspace \
            --all-features \
            --engine llvm \
            --out xml \
            --out html \
            --out markdown \
            --timeout 300 \
            --skip-clean || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            cobertura.xml
            tarpaulin-report.html
            coverage-report.md
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('coverage-report.md', 'utf8');
            } catch (e) {
              report = 'Coverage report generated. See artifacts for details.';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Code Coverage Report\n\n${report}`
            });

  # 文档生成
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features

      - name: Check doc links
        run: cargo doc --workspace --no-deps --all-features 2>&1 | grep -i "warning" && exit 1 || true

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc
          retention-days: 7

  # 文档测试
  doc-test:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-doctest-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doctest-

      - name: Run doc tests
        run: cargo test --workspace --doc --all-features --verbose

  # 依赖检查
  deps-check:
    name: Dependencies Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Check Cargo.toml formatting
        run: |
          # 检查 Cargo.toml 文件是否有格式问题
          find . -name "Cargo.toml" -exec cargo tomlfmt --check {} \; 2>/dev/null || echo "tomlfmt not installed, skipping"

      - name: Check unused dependencies
        run: |
          cargo install cargo-udeps --locked
          cargo udeps --workspace 2>&1 || echo "Check completed with warnings"

  # 总结检查
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, coverage, doc, doc-test, deps-check]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Generate PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Code Formatting': '${{ needs.fmt.result }}',
              'Clippy Linting': '${{ needs.clippy.result }}',
              'Test Suite': '${{ needs.test.result }}',
              'Code Coverage': '${{ needs.coverage.result }}',
              'Documentation': '${{ needs.doc.result }}',
              'Doc Tests': '${{ needs.doc-test.result }}',
              'Dependencies Check': '${{ needs.deps-check.result }}'
            };
            
            let status = '✅';
            for (const [name, result] of Object.entries(jobs)) {
              if (result !== 'success') {
                status = '❌';
                break;
              }
            }
            
            const summary = Object.entries(jobs)
              .map(([name, result]) => {
                const icon = result === 'success' ? '✅' : 
                            result === 'failure' ? '❌' : 
                            result === 'skipped' ? '⏭️' : '⚠️';
                return `- ${icon} ${name}`;
              })
              .join('\n');
            
            const body = `## ${status} PR Checks Summary
            
            ${summary}
            
            ---
            *All checks completed*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
