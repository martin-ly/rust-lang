name: Quality Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  cargo-check:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Run cargo check
        run: cargo check --workspace
        continue-on-error: false

  cargo-test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run cargo test
        run: cargo test --workspace --quiet
        continue-on-error: false

  cargo-clippy:
    name: Cargo Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: false

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --no-fetch
        continue-on-error: false

  cargo-vet:
    name: Cargo Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-vet-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-vet-

      - name: Install cargo-vet
        run: cargo install cargo-vet --locked

      - name: Run cargo vet
        run: cargo vet --locked
        continue-on-error: false

  mdbook-build:
    name: mdBook Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-mdbook-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-mdbook-

      - name: Install mdbook
        run: cargo install mdbook --locked

      - name: Build mdbook
        run: mdbook build
        continue-on-error: false

  kb-auditor-link-check:
    name: KB Auditor Link Check (concept + docs + content + knowledge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run KB auditor link check (covers concept/ and docs/content/knowledge local links)
        run: python scripts/kb_auditor.py --link-check
        continue-on-error: false

  content-overlap:
    name: Content Overlap Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run content overlap detection
        run: python scripts/detect_content_overlap.py
        continue-on-error: false

  i18n-terms:
    name: Bilingual Terminology Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run bilingual annotations check
        run: python scripts/add_bilingual_annotations.py --mode check-only
        continue-on-error: false

  mermaid-syntax:
    name: Mermaid Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Mermaid syntax check
        run: python scripts/check_mermaid_syntax.py
        continue-on-error: false

  metadata-consistency:
    name: Metadata Consistency (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run metadata consistency check (blocking, promoted 2026-07-14 per AGENTS.md §5.2)
        run: python scripts/check_metadata_consistency.py --strict
        continue-on-error: false

  content-overlap-v2:
    name: Content Overlap v2 (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run content overlap v2 + triage (blocking, promoted 2026-07-12 per AGENTS.md §5.2)
        run: |
          python scripts/detect_content_overlap_v2.py --budget 999999
          python scripts/triage_overlap.py
          ACTIONABLE=$(python -c "import glob,json; s=json.load(open(sorted(glob.glob('reports/OVERLAP_TRIAGE_*.json'))[-1],encoding='utf-8'))['summary']; print(s.get('MERGE',0)+s.get('DOCS_INTERNAL',0))")
          echo "[overlap-v2] actionable (MERGE+DOCS_INTERNAL) = $ACTIONABLE (baseline 0)"
          if [ "$ACTIONABLE" -gt 0 ]; then
            echo "❌ overlap-v2 可处理重复对 > 0 — 阻断。MERGE 合并/stub、DOCS_INTERNAL 合并/互链/登记 SERIES 白名单（附证据）。"
            exit 1
          fi
        continue-on-error: false

  topology-quality:
    name: Topology Quality (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run topology quality check (blocking, promoted 2026-07-12 per AGENTS.md §5.2)
        run: python scripts/check_topology_quality.py --strict
        continue-on-error: false

  kg-shacl-validation:
    name: KG SHACL Validation (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run KG SHACL validation (blocking, promoted 2026-07-12 per AGENTS.md §5.2)
        run: python scripts/check_kg_shapes.py --strict
        continue-on-error: false

  semantic-health:
    name: Semantic Health (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run semantic health dashboard (blocking, promoted 2026-07-14 per AGENTS.md §5.2)
        run: python scripts/semantic_health.py --strict
        continue-on-error: false

  concept-authority-coverage:
    name: Concept Authority Coverage (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run concept international authority coverage (blocking, promoted 2026-07-14 per AGENTS.md §5.2; +crates docs section incl. stub canonical link health)
        run: python scripts/check_concept_authority_coverage.py --strict --include-crates
        continue-on-error: false

  canonical-uniqueness:
    name: Canonical Uniqueness (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run canonical uniqueness check (blocking, promoted 2026-07-12 per AGENTS.md §5.2)
        run: python scripts/check_canonical_uniqueness.py --strict
        continue-on-error: false

  concept-consistency-audit:
    name: Concept Consistency Audit (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run concept consistency audit (blocking, promoted 2026-07-12 per AGENTS.md §5.2)
        run: python scripts/concept_consistency_auditor.py --strict
        continue-on-error: false

  naming-convention:
    name: Naming Convention (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run naming convention lint (blocking, promoted 2026-07-14 per AGENTS.md §5.2; --strict blocks on ERROR only, WARN stays observe; AGENTS.md §4.0)
        run: python scripts/check_naming_convention.py --strict
        continue-on-error: false

  concept-code-blocks:
    name: Concept Code Blocks (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run concept/ code block compile check (blocking, promoted 2026-07-14 per AGENTS.md §5.2; default sample 300 + all compile_fail blocks)
        run: python scripts/check_concept_code_blocks.py --strict
        continue-on-error: false

  mindmap-coverage:
    name: Mindmap Coverage (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run mindmap/counterexample coverage check (blocking, promoted 2026-07-14 per AGENTS.md §5.2; baselines mindmap>=10%/counterexample>=40%)
        run: python scripts/check_mindmap_coverage.py --strict
        continue-on-error: false

  quiz-system:
    name: Quiz System (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run quiz system consistency check (blocking, promoted 2026-07-14 per AGENTS.md §5.2)
        run: python scripts/check_quiz_system.py --strict
        continue-on-error: false

  examples-compile:
    name: Examples Compile Check (strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch examples_check deps (script runs cargo check --offline)
        run: cargo fetch --locked --manifest-path examples/examples_check/Cargo.toml
      - name: Run loose examples compile check (blocking, promoted 2026-07-14 per AGENTS.md §5.2; new CI job)
        run: python scripts/check_examples_compile.py --strict
        continue-on-error: false

  stub-purity:
    name: Stub Purity (observe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run stub purity check (observe, promoted to blocking per AGENTS.md §5.2 when baseline reaches 0)
        run: python scripts/check_stub_purity.py
        continue-on-error: true

  cross-domain-coverage:
    name: Cross-Domain Coverage (observe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run cross-domain coverage check (observe, promoted to blocking per AGENTS.md §5.2 when coverage=100%)
        run: python scripts/check_cross_domain_coverage.py
        continue-on-error: true

  kg-relation-precision:
    name: KG Relation Precision (observe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run KG relation precision check (observe, promoted to blocking per AGENTS.md §5.2 when core generic ratio=0)
        run: python scripts/check_kg_relation_precision.py
        continue-on-error: true

  decision-tree-rustc-error-code-coverage:
    name: Decision Tree rustc Error Code Coverage (observe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run decision tree rustc error code coverage check (observe, promoted to blocking per AGENTS.md §5.2 when node ambiguity=0 and stable)
        run: python scripts/check_decision_trees.py
        continue-on-error: true

  quality-gates-summary:
    name: Quality Gates Summary
    runs-on: ubuntu-latest
    needs:
      - cargo-check
      - cargo-test
      - cargo-clippy
      - cargo-audit
      - cargo-vet
      - mdbook-build
      - kb-auditor-link-check
      - content-overlap
      - i18n-terms
      - mermaid-syntax
      - metadata-consistency
      - content-overlap-v2
      - topology-quality
      - kg-shacl-validation
      - semantic-health
      - concept-authority-coverage
      - canonical-uniqueness
      - concept-consistency-audit
      - naming-convention
      - concept-code-blocks
      - mindmap-coverage
      - quiz-system
      - examples-compile
      - stub-purity
      - cross-domain-coverage
      - kg-relation-precision
      - decision-tree-rustc-error-code-coverage
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Generate summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'Cargo Check': '${{ needs.cargo-check.result }}',
              'Cargo Test': '${{ needs.cargo-test.result }}',
              'Cargo Clippy': '${{ needs.cargo-clippy.result }}',
              'Cargo Audit': '${{ needs.cargo-audit.result }}',
              'Cargo Vet': '${{ needs.cargo-vet.result }}',
              'mdBook Build': '${{ needs.mdbook-build.result }}',
              'KB Auditor Link Check': '${{ needs.kb-auditor-link-check.result }}',
              'Content Overlap Detection': '${{ needs.content-overlap.result }}',
              'Bilingual Terminology Check': '${{ needs.i18n-terms.result }}',
              'Mermaid Syntax Check': '${{ needs.mermaid-syntax.result }}',
              'Metadata Consistency (strict)': '${{ needs.metadata-consistency.result }}',
              'Content Overlap v2 (strict)': '${{ needs.content-overlap-v2.result }}',
              'Topology Quality (strict)': '${{ needs.topology-quality.result }}',
              'KG SHACL Validation (strict)': '${{ needs.kg-shacl-validation.result }}',
              'Semantic Health (strict)': '${{ needs.semantic-health.result }}',
              'Concept Authority Coverage (strict)': '${{ needs.concept-authority-coverage.result }}',
              'Canonical Uniqueness (strict)': '${{ needs.canonical-uniqueness.result }}',
              'Concept Consistency Audit (strict)': '${{ needs.concept-consistency-audit.result }}',
              'Naming Convention (strict)': '${{ needs.naming-convention.result }}',
              'Concept Code Blocks (strict)': '${{ needs.concept-code-blocks.result }}',
              'Mindmap Coverage (strict)': '${{ needs.mindmap-coverage.result }}',
              'Quiz System (strict)': '${{ needs.quiz-system.result }}',
              'Examples Compile Check (strict)': '${{ needs.examples-compile.result }}',
              'Stub Purity (observe)': '${{ needs.stub-purity.result }}',
              'Cross-Domain Coverage (observe)': '${{ needs.cross-domain-coverage.result }}',
              'KG Relation Precision (observe)': '${{ needs.kg-relation-precision.result }}',
              'Decision Tree rustc Error Code Coverage (observe)': '${{ needs.decision-tree-rustc-error-code-coverage.result }}'
            };

            let status = '✅';
            for (const [name, result] of Object.entries(jobs)) {
              if (result !== 'success') {
                status = '❌';
                break;
              }
            }

            const summary = Object.entries(jobs)
              .map(([name, result]) => {
                const icon = result === 'success' ? '✅' :
                             result === 'failure' ? '❌' :
                             result === 'skipped' ? '⏭️' : '⚠️';
                return `- ${icon} ${name}`;
              })
              .join('\n');

            const body = `## ${status} Quality Gates Summary

            ${summary}

            ---
            *All 23 quality gates completed (23 blocking + 4 semantic observe)*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
