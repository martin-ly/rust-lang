[toolchain]
channel = "nightly"  # Rust 1.96 预计 2026-05-28 发布 stable，当前使用 nightly 预览
components = [
    "rustfmt",           # 代码格式化
    "clippy",            # 静态分析
    "rust-analyzer",     # IDE支持
    "rust-src",          # 标准库源码(用于调试)
    "rust-docs",         # 文档
    "llvm-tools",        # LLVM工具(用于代码覆盖率)
]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "wasm32-unknown-unknown",
    "wasm32-wasip1",
]
profile = "default"

# 注意: Miri在Windows上不可用，仅在Linux CI中使用
# 使用: rustup component add miri --toolchain nightly (仅限Linux)
