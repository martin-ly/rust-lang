[toolchain]
# MSRV: stable 1.96.1（当前 latest stable 已对应 1.96.1）
# 使用 "stable" 通道而非精确版本号，避免 rustup 镜像在版本发布初期
# 尚未同步 1.96.0 安装包导致的 404。
# nightly-only 预览模块仍通过各 crate 的 build.rs 自动检测 nightly 并设置
# `--cfg nightly` 来启用；stable 默认构建不会解析这些模块。
channel = "stable"
components = [
    "rustfmt",           # 代码格式化
    "clippy",            # 静态分析
    "rust-analyzer",     # IDE支持
    "rust-src",          # 标准库源码(用于调试)
    "rust-docs",         # 文档
    "llvm-tools",        # LLVM工具(用于代码覆盖率)
]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "wasm32-unknown-unknown",
    "wasm32-wasip1",
]
profile = "default"

# 注意: Miri在Windows上不可用，仅在Linux CI中使用
# 使用: rustup component add miri --toolchain nightly (仅限Linux)
