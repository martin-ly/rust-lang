[toolchain]
channel = "nightly"  # 项目使用 nightly 1.98.0 预览实验性特性（如 gen_blocks、never_type 等）
# 注意: workspace 整体依赖 nightly feature gates，因此不切换到 stable 工具链。
# Rust 1.97.0 稳定版 API 仍可在 nightly 上激活并使用；相关文档会标注实际稳定版本。
components = [
    "rustfmt",           # 代码格式化
    "clippy",            # 静态分析
    "rust-analyzer",     # IDE支持
    "rust-src",          # 标准库源码(用于调试)
    "rust-docs",         # 文档
    "llvm-tools",        # LLVM工具(用于代码覆盖率)
]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "wasm32-unknown-unknown",
    "wasm32-wasip1",
]
profile = "default"

# 注意: Miri在Windows上不可用，仅在Linux CI中使用
# 使用: rustup component add miri --toolchain nightly (仅限Linux)
