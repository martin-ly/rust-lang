[toolchain]
channel = "1.96.0"  # MSRV: stable 1.96.0
# nightly-only 预览模块通过各 crate 的 `nightly` feature 条件编译隔离，
# 默认 stable 构建不会解析或启用这些模块。
components = [
    "rustfmt",           # 代码格式化
    "clippy",            # 静态分析
    "rust-analyzer",     # IDE支持
    "rust-src",          # 标准库源码(用于调试)
    "rust-docs",         # 文档
    "llvm-tools",        # LLVM工具(用于代码覆盖率)
]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "wasm32-unknown-unknown",
    "wasm32-wasip1",
]
profile = "default"

# 注意: Miri在Windows上不可用，仅在Linux CI中使用
# 使用: rustup component add miri --toolchain nightly (仅限Linux)
