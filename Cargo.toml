# 工作区特性标志配置 - 优化编译时间和依赖管理
# 注意: 工作区依赖不能设为可选，特性标志在各crate中配置

# 安全补丁 - 强制使用安全版本的依赖
# 注意：通过工作区依赖统一管理版本，避免使用patch

[workspace.lints.rust]
unsafe_code = "forbid"
double_negations = "warn"
irrefutable_let_patterns = "allow"
# Rust 1.95+ 新增lints
unused_crate_dependencies = "warn"
missing_docs = "allow"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
pedantic = { level = "allow", priority = -1 }
nursery = { level = "allow", priority = -1 }
cargo = { level = "allow", priority = -1 }
# 额外有用的lints
match_wildcard_for_single_variants = "warn"
redundant_closure_for_method_calls = "warn"
# Rust 1.95+ 推荐lints
ignored_unit_patterns = "warn"
manual_c_str_literals = "warn"
unnecessary_map_on_constructor = "warn"
map_with_unused_argument_over_ranges = "warn"
unnecessary_semicolon = "warn"
unused_result_ok = "warn"
zero_repeat_side_effects = "warn"
manual_is_power_of_two = "warn"
unnecessary_min_or_max = "warn"
single_match_else = "allow"
needless_lifetimes = "warn"
type_complexity = "allow"
too_many_arguments = "allow"
# 异步相关
await_holding_lock = "warn"
await_holding_refcell_ref = "warn"
# 性能相关
slow_zero_fill = "warn"
unnecessary_box_returns = "warn"
# 代码质量
module_name_repetitions = "allow"
struct_field_names = "allow"
similar_names = "allow"

# 注: core2 补丁已移除
# multihash 0.19.4+ / libp2p-core 已迁移到 no_std_io2，不再需要 core2 补丁
