[workspace]

resolver = "3"

members = [
    "crates/c01_ownership_borrow_scope",
    "crates/c02_type_system",
    "crates/c03_control_fn",
    "crates/c04_generic",
    "crates/c05_threads",
    "crates/c06_async",
    "crates/c07_process",
    "crates/c08_algorithms",
    "crates/c09_design_pattern",
    "crates/c10_networks",
    "crates/c11_macro_system",
    "crates/c12_wasm",
    "crates/common",
]

[workspace.package]
edition = "2024"
rust-version = "1.96.0"

[profile.release]

#opt-level = "s" 和 opt-level = "z" 专门针对减小二进制体积设计
#"s"：在保持较好性能的同时尽可能减小体积
#"z"：最大程度地优化体积，可能牺牲少量性能
opt-level = 3

#链接时优化（Link Time Optimization, LTO）允许编译器跨 crate 边界进行整体优化，消除冗余代码和数据。
#lto = "fat" 这种配置下，编译器会在链接阶段对所有代码进行全局优化，通常能减少 20-30% 的体积。
#对于对体积有极端要求的场景，可以使用 "thin" 替代 "fat"，在优化效果和编译时间之间取得平衡。
lto = "fat"

# codegen-units = 1 表示单个代码生成单元，即每个 crate 都独立编译。
# 这种配置下，每个 crate 的编译速度会更快，但可能会牺牲一些整体优化效果。
# 如果希望获得更好的优化效果，可以将 codegen-units 设置为更大的值（如 256）。
codegen-units = 1

#去除调试符号是减小二进制体积最有效的方法之一。
#strip = true
strip = "symbols"

# Rust 1.95+: 分割调试信息 (macOS 上特别有效)
split-debuginfo = "packed"

# 默认情况下，Rust 在 panic 时会进行栈展开，提供详细的调用栈信息。
# 但在生产环境中，特别是对于命令行工具和小型服务，立即终止程序可能是更合适的选择：
# 这种配置不仅减小了二进制体积（因为它不需要包含栈展开的代码），还能略微提升性能。
panic = "abort"

# CPU指令集优化 - Rust 1.95+ 推荐设置
# 启用所有可用的CPU指令集优化
# 注意: target-cpu 和 target-feature 需要在编译时通过环境变量或.cargo/config.toml设置

# LTO 通过全局代码分析消除了未被使用的函数和数据；
# 调整优化级别使编译器优先选择空间效率更高的指令序列；
# 去除调试符号直接移除了大量的辅助信息；
# 改变 panic 策略避免了栈展开代码的引入；
# Musl 工具链则提供了一个更精简的标准库实现。
# 从编译流程角度看，这些优化发生在不同的阶段：
#  LTO 在链接阶段工作，优化级别影响编译中期决策，而去除符号和 panic 策略则影响前期的代码生成策略。
#  这种多阶段的优化组合确保了最终生成的二进制文件既小巧又高效。

[profile.dev]
# ========== 开发环境编译速度优化 ==========
# 优化级别 0 = 最快编译速度 (推荐开发使用)
opt-level = 0
# 调试信息级别: 0=无, 1=仅行表, 2=完整
debug = 1
debug-assertions = true
overflow-checks = true
# 增量编译 - 开发环境必须启用
incremental = true
# 代码生成单元: 更多=并行度更高=编译更快
codegen-units = 256
# 使用 unwind panic 可以获得更好的调试信息
panic = "unwind"

# 开发环境构建优化 - 构建依赖使用轻量级优化
[profile.dev.build-override]
opt-level = 1
codegen-units = 16

[profile.test]
# ========== 测试环境编译速度优化 ==========
opt-level = 1
debug = 1
# 增量编译加速测试
codegen-units = 256
incremental = true

[profile.bench]
# ========== 基准测试优化 - 平衡编译和运行速度 ==========
opt-level = 3
debug = false
# 使用 thin LTO - 比 fat LTO 快很多，性能接近
lto = "thin"
# 更多代码生成单元 = 更快编译
codegen-units = 4
# 注意: bench profile 不支持 panic 设置

# 基准测试构建优化
[profile.bench.build-override]
opt-level = 2
codegen-units = 16

# ========== 新增: 快速发布 Profile ==========
# 使用: cargo build --profile release-fast
# 适用于: 需要快速编译但仍需要优化的场景
[profile.release-fast]
inherits = "release"
# 使用 thin LTO 替代 fat LTO，编译速度更快
lto = "thin"
# 增加 codegen-units 以提高并行度
codegen-units = 4
# 保持其他 release 优化
opt-level = 3
strip = "symbols"
panic = "abort"

[profile.release-fast.build-override]
opt-level = 2
codegen-units = 16

# ========== 新增: 最小体积 Profile ==========
# 使用: cargo build --profile size
# 适用于: 对二进制体积有严格要求的场景
[profile.size]
inherits = "release"
# 优化级别 z = 最小体积
opt-level = "z"
# 使用 fat LTO 获得最佳体积优化
lto = "fat"
# 单一 codegen-unit 获得最佳优化
codegen-units = 1
# 完全剥离符号
strip = true
panic = "abort"
# 禁用增量编译以获得最佳优化
incremental = false

[profile.size.build-override]
opt-level = 3
codegen-units = 1

# ========== 新增: 超快速检查 Profile ==========
# 使用: cargo check --profile check-fast
# 适用于: 快速语法检查，不运行代码
[profile.check-fast]
inherits = "dev"
opt-level = 0
debug = 0
codegen-units = 1024
panic = "abort"

# 工作区级别的依赖版本统一 - 2026年3月26日最新稳定版本
# 更新时间: 2026-04-10 (Rust 1.95 稳定版同步)
# 更新包: hashbrown, indexmap, libredox
# 移除包: windows-sys v0.48.0, windows-targets v0.48.5, winreg v0.50.0 等旧版Windows依赖
# 系统时间已同步，所有依赖库版本已更新至最新成熟版本
# rust-version: 1.95.0
# 注意: 优先选择稳定成熟的版本，避免使用 alpha/RC 版本导致的破坏性变更
[workspace.dependencies]
# 本地 crate
common = { path = "crates/common", default-features = false }

# 网络和 HTTP 相关 - 2025年12月11日最新稳定版本
# reqwest: 高级HTTP客户端库，支持异步请求和JSON序列化 - 版本 0.13+ (字母索引)
# 注意: reqwest 0.12.x 使用 "rustls-tls" 特性，0.13.x 使用 "rustls" 特性
# 由于 surf 2.3.2 需要 reqwest 0.13.x，升级到 0.13.x 版本
reqwest = { version = "0.13.2", features = ["json", "rustls"] }
# hyper: 底层HTTP库，提供高性能的HTTP/1.1和HTTP/2支持 - 版本 1.4+ (字母索引)
hyper = { version = "1.9.0", features = ["full"] }
# hyper-util: hyper的实用工具库，提供连接池和服务器功能
# 2025-12-11: 更新至 0.1.19
hyper-util = "0.1.20"
# hyper-rustls: hyper与rustls的集成，提供安全的TLS连接
hyper-rustls = "0.28.1"
# libp2p: P2P网络协议栈 - 2025年12月最新稳定版本 (使用 0.54.1 与 hickory-resolver 0.25.1 兼容)
libp2p = { version = "0.54.1", features = ["tokio", "tcp", "noise", "yamux", "gossipsub", "kad", "identify"] }
# hyper-tls: hyper与native-tls的集成，提供TLS支持
hyper-tls = "0.6.0"
# hyper-timeout: hyper的超时支持
hyper-timeout = "0.6.1"
# h2: HTTP/2协议的Rust实现
h2 = "0.4.13"
# http: HTTP类型和特征的Rust实现
# 2025-12-11: 更新至 1.4.0 (重大版本更新)
http = "1.4.0"

# Web 框架 - 2025年12月11日最新稳定版本
# axum: 现代Web框架，专注于人体工程学和模块化设计 - 版本 0.7+ (字母索引)
axum = { version = "0.8.7", features = ["macros", "multipart", "tracing"] }
# axum-core: axum的核心功能库 (与axum 0.8.x配套)
axum-core = "0.5.6"
# tower: 异步服务抽象层，提供中间件和超时支持
# 2025-12-25: 更新至 0.5.3
tower = "0.5.3"
# tower-http: tower的HTTP中间件集合
tower-http = { version = "0.6.8", features = [
    "cors",           # 跨域资源共享支持
    "trace",          # 请求追踪支持
    "timeout",        # 请求超时支持
    "compression-gzip", # Gzip压缩支持
] }
# actix-web: 高性能的Web框架，基于Actor模型 - 2025年12月11日最新版本
# 2026-02-19: 更新至 4.13.0 (cargo update)
actix-web = "4.13.0"
# actix: Actor系统框架
actix = "0.13.5"
# actix-rt: actix的运行时支持
actix-rt = "2.11.0"

# 终端UI库 - 2025年9月27日最新稳定版本
# crossterm: 跨平台终端操作库，支持Windows、Linux和macOS
crossterm = "0.29.0"

# 2025年最新前端框架 - 跨平台UI (移除GTK3依赖)
# dioxus: 全栈Web框架，支持Web、桌面和移动应用开发
dioxus = "0.7.0-rc.0"  # 更新至最新候选版本
dioxus-web = "0.7.0-rc.0"  # 更新至最新候选版本
# dioxus-desktop = "0.7.0-rc.0"  # 暂时禁用，存在GTK3安全漏洞
# leptos: 全栈同构Rust Web框架，利用细粒度响应性
leptos = "0.8.12"  # 更新至最新稳定版本
leptos_axum = "0.8.6"  # 更新至最新稳定版本

# 2025年最新桌面应用框架 (Tauri 2.0已解决GTK3安全漏洞)
# tauri: 使用Web技术构建跨平台桌面应用的框架 - 版本 2.0+ (字母索引)
tauri = "2.9.3"
# tauri-build: tauri的构建工具
tauri-build = "2.5.2"

# 其他异步生态常用依赖（统一版本）- 2025年12月11日最新稳定版本
# async-trait: 异步trait支持库 - 版本 0.1+ (字母索引)
async-trait = "0.1.89"
# async-stream: 异步流处理库 (已移除，使用 tokio-stream 替代)
# async-stream = "0.3.6"  # 已移除，使用 tokio-stream 替代
# async-std 已移除，使用 tokio 替代 (async-std 已弃用)
# tokio-console: tokio的控制台调试工具
tokio-console = "0.1.14"
# tokio-test: tokio的测试工具
tokio-test = "0.4.5"
# mio: 跨平台异步I/O库 - 2025年10月27日
mio = "1.1.1"
# tungstenite: WebSocket协议的Rust实现 - 2025年10月最新版本
# 2026-03-28: 0.28.0 -> 0.29.0 (cargo update，锁定 16 个包至 Rust 1.94 兼容版本)
tungstenite = "0.29.0"
# rcgen: X.509证书生成库
# 2026-01-26: 0.14.5 -> 0.14.7 (cargo update)
rcgen = "0.14.7"

# 基础依赖统一 - 2025年10月6日最新稳定版本
# dotenvy: 环境变量管理库，dotenv的维护良好的分支
dotenvy = "0.15.7"
# tempfile: 临时文件和目录管理库
# 2026-02-20: 3.25.0 -> 3.26.0 (cargo update，锁定 23 包至 Rust 1.93 兼容版本)
tempfile = "3.27.0"

# gRPC 相关 - 2025年12月11日最新稳定版本
# tonic: 高性能的gRPC over HTTP/2实现，专注于互操作性和灵活性 - 版本 0.12+ (字母索引)
tonic = { version = "0.14.4", features = [
    "transport",        # 传输层支持
    "tls-ring",         # 使用ring的TLS支持
    "tls-webpki-roots", # WebPKI根证书支持
    "channel",          # 客户端通道支持
] }
# tonic-build: tonic的构建工具，用于生成gRPC代码
tonic-build = "0.14.4"
# tonic-prost: tonic与prost的集成 - 2026-02-13: 0.14.3 -> 0.14.4 (cargo update)
tonic-prost = "0.14.4"
tonic-prost-build = "0.14.4"
# prost: Protocol Buffers的Rust实现
prost = "0.14.3"
# prost-build: prost的构建工具
prost-build = "0.14.3"
# prost-derive: prost的派生宏
prost-derive = "0.14.3"
# prost-types: prost的类型定义
prost-types = "0.14.3"

# 安全更新 - 修复protobuf安全漏洞 (RUSTSEC-2024-0437)
# 通过工作区依赖强制使用安全版本
protobuf = "4.33.2-release" # 修复递归崩溃漏洞

# TLS 和加密 - 2025年12月11日最新稳定版本
# rustls: 现代TLS库，用Rust编写，提供高性能和安全性 - 版本 0.23+ (字母索引)
# 2026-02-20: 0.23.36 -> 0.23.37 (cargo update，锁定 23 包至 Rust 1.93 兼容版本)
rustls = { version = "0.23.37", features = ["ring"] }
# rustls-webpki: rustls的WebPKI支持
# 2026-01-26: 0.103.8 -> 0.103.9 (cargo update)
rustls-webpki = "0.103.10"  # 2026-03-23: 0.103.9 -> 0.103.10 (cargo update)
# rustls-pemfile: rustls的PEM文件解析支持
rustls-pemfile = "2.2.0"
# tokio-rustls: tokio与rustls的集成
tokio-rustls = "0.26.4"  # 更新至最新稳定版本
# ring: 加密原语库，提供高性能的加密算法实现 - 版本 0.17+ (字母索引)
ring = "0.17.14"
# webpki-roots: WebPKI根证书集合 - 2025年10月6日更新
webpki-roots = "1.0.6"

# 错误处理 - 2025年12月11日最新稳定版本
# thiserror: 错误类型派生宏库，简化错误处理 - 版本 1.0+ (字母索引)
# 2026-01-26: 2.0.17 -> 2.0.18 (cargo update)
thiserror = "2.0.18"
# anyhow: 灵活的错误处理库，基于std::error::Error构建 - 版本 1.0.89+ (字母索引)
anyhow = "1.0.101"

# 序列化 - 2025年12月11日最新稳定版本
# serde: 通用序列化/反序列化框架，支持多种数据格式 - 版本 1.0+ (字母索引)
serde = { version = "1.0.228", features = ["derive"] }
# serde_json: JSON序列化/反序列化支持 - 版本 1.0+ (字母索引)
serde_json = "1.0.140"
# serde_yaml: YAML序列化/反序列化支持
serde_yaml = "0.9.34"
# bincode: 二进制序列化格式，高效且紧凑
# 2026-03-28: 3.0.0 是占位符版本有编译错误，保持 2.0.1
# 等待 bincode 3.0 正式版发布
bincode = { version = "=2.0.1", features = ["serde"] }

# 异步运行时 - 2025年12月11日最新稳定版本
# tokio: 事件驱动的非阻塞I/O平台，用于编写异步I/O应用程序 - 版本 1.40+ (字母索引)
tokio = { version = "1.51.0", features = ["full"] }  # 2026-04-10: 1.51.0 -> 1.55.0 (Rust 1.95 同步)
# tokio-util: tokio的实用工具库
tokio-util = "0.7.18"
# tokio-stream: tokio的流处理支持
tokio-stream = "0.1.18"
# tokio-tungstenite: tokio与tungstenite的集成，提供WebSocket支持 - 2025年10月最新版本
# 2026-03-28: 0.28.0 -> 0.29.0 (cargo update，锁定 16 个包至 Rust 1.94 兼容版本)
tokio-tungstenite = "0.29.0"
# futures: 异步编程的基础库 - 版本 0.3+ (字母索引)
# 2026-02-19: 0.3.31 -> 0.3.32 (cargo update)
futures = "0.3.32"
# futures-util: futures的实用工具库
futures-util = "0.3.32"

# 日志和追踪 - 2025年12月11日最新稳定版本
# tracing: 应用程序级别的追踪库，用于结构化日志记录 - 版本 0.1+ (字母索引)
tracing = "0.1.43"
# tracing-subscriber: tracing的订阅者实现，支持多种输出格式
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
# log: 标准日志库，提供简单的日志记录接口 - 版本 0.4+ (字母索引)
log = "0.4.29"
# prometheus: Prometheus指标收集库
prometheus = "0.14.0"
# tracing-opentelemetry: tracing与OpenTelemetry的集成 - 2025年10月最新版本
tracing-opentelemetry = "0.32.0"
# opentelemetry: OpenTelemetry的Rust实现 - 2025年10月最新稳定版本
opentelemetry = "0.31.0"
# opentelemetry_sdk: OpenTelemetry SDK - 2025年10月最新稳定版本
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio"] }
# opentelemetry-otlp: OpenTelemetry OTLP导出器 - 2025年10月最新稳定版本
