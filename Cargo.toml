# cargo audit 配置: .cargo/audit.toml

[workspace.lints.rust]
unsafe_code = "forbid"
double_negations = "warn"
irrefutable_let_patterns = "allow"
# Rust 1.95+ 新增lints (1.97+ 仍适用)
unused_crate_dependencies = "warn"
missing_docs = "allow"
# 声明 nightly 预览模块使用的自定义 cfg，避免 unexpected_cfgs 警告
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(nightly)', 'cfg(kani)', 'cfg(prusti)'] }

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
pedantic = { level = "allow", priority = -1 }
nursery = { level = "allow", priority = -1 }
cargo = { level = "allow", priority = -1 }
# 额外有用的lints
match_wildcard_for_single_variants = "warn"
redundant_closure_for_method_calls = "warn"
# Rust 1.95+ 推荐lints (1.97+ 仍适用)
ignored_unit_patterns = "warn"
manual_c_str_literals = "warn"
unnecessary_map_on_constructor = "warn"
map_with_unused_argument_over_ranges = "warn"
unnecessary_semicolon = "warn"
unused_result_ok = "warn"
zero_repeat_side_effects = "warn"
manual_is_power_of_two = "warn"
unnecessary_min_or_max = "warn"
single_match_else = "allow"
needless_lifetimes = "warn"
# 2026-07-01: rust_197_features.rs 清理后固化的 lint 策略
borrowed_box = "deny"
let_and_return = "deny"
manual_div_ceil = "deny"
non_minimal_cfg = "deny"
result_unit_err = "deny"
type_complexity = "allow"
too_many_arguments = "allow"
# 异步相关
await_holding_lock = "warn"
await_holding_refcell_ref = "warn"
# 性能相关
unnecessary_box_returns = "warn"
# 代码质量
module_name_repetitions = "allow"
struct_field_names = "allow"
similar_names = "allow"

# 注: core2 补丁已移除
# multihash 0.19.4+ / libp2p-core 已迁移到 no_std_io2，不再需要 core2 补丁

# ============ [patch.crates-io] ============
# proc-macro-error2 2.0.1（leptos_macro / reactive_stores_macro 传递依赖）触发
# future-incompat 警告 E0365：`pub use proc_macro;` 重新导出私有 extern crate，
# 将在未来 Rust 版本变为硬错误（rust-lang/rust#127909）。
# 上游（GnomedDev/proc-macro-error-2）自 2024-09 后无修复发布，
# 因此 vendor 到本地并应用官方建议的一行修复（extern crate 改为 pub extern crate）。
# 上游发布修复版后应移除此 patch。
[patch.crates-io]
proc-macro-error2 = { path = "vendor/proc-macro-error2" }
