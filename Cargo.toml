[workspace]

resolver = "3"

members = [
    "crates/c01_ownership_borrow_scope",
    "crates/c02_type_system",
    "crates/c03_control_fn",
    "crates/c04_generic",
    "crates/c05_threads",
    "crates/c06_async",
    "crates/c07_process",
    "crates/c08_algorithms",
    "crates/c09_design_pattern",
    "crates/c10_networks",
    "crates/c11_macro_system_proc",
    "crates/c12_wasm",
    "crates/c13_embedded",
    "crates/c14_semantic_web",
    "crates/c15_verification_tools",
    "crates/c16_gui",
    "crates/c17_resolver_v3_public_demo",
    "crates/common",
    "crates/integration_tests",
    "exercises",
]

exclude = [
    "crates/c08_algorithms/fuzz",
    "crates/c13_embedded/real-hardware-demos/embassy-demo",
    "crates/c13_embedded/real-hardware-demos/rtic-demo",
    "vendor",
]

[workspace.package]
version = "3.1.0"
edition = "2024"
rust-version = "1.97.1"
license = "MIT OR Apache-2.0"
authors = ["Rust Learning Community"]
repository = "https://github.com/martin-ly/rust-lang"
homepage = "https://github.com/martin-ly/rust-lang"

[profile.release]

#opt-level = "s" 和 opt-level = "z" 专门针对减小二进制体积设计
#"s"：在保持较好性能的同时尽可能减小体积
#"z"：最大程度地优化体积，可能牺牲少量性能
opt-level = 3

#链接时优化（Link Time Optimization, LTO）允许编译器跨 crate 边界进行整体优化，消除冗余代码和数据。
#lto = "fat" 这种配置下，编译器会在链接阶段对所有代码进行全局优化，通常能减少 20-30% 的体积。
#对于对体积有极端要求的场景，可以使用 "thin" 替代 "fat"，在优化效果和编译时间之间取得平衡。
lto = "fat"

# codegen-units = 1 表示单个代码生成单元，即每个 crate 都独立编译。
# 这种配置下，每个 crate 的编译速度会更快，但可能会牺牲一些整体优化效果。
# 如果希望获得更好的优化效果，可以将 codegen-units 设置为更大的值（如 256）。
codegen-units = 1

#去除调试符号是减小二进制体积最有效的方法之一。
#strip = true
strip = "symbols"

# Rust 1.95+: 分割调试信息 (macOS 上特别有效，1.97+ 仍适用)
split-debuginfo = "packed"

# 默认情况下，Rust 在 panic 时会进行栈展开，提供详细的调用栈信息。
# 但在生产环境中，特别是对于命令行工具和小型服务，立即终止程序可能是更合适的选择：
# 这种配置不仅减小了二进制体积（因为它不需要包含栈展开的代码），还能略微提升性能。
panic = "abort"

# CPU指令集优化 - Rust 1.95+ 推荐设置 (1.97+ 仍适用)
# 启用所有可用的CPU指令集优化
# 注意: target-cpu 和 target-feature 需要在编译时通过环境变量或.cargo/config.toml设置

# LTO 通过全局代码分析消除了未被使用的函数和数据；
# 调整优化级别使编译器优先选择空间效率更高的指令序列；
# 去除调试符号直接移除了大量的辅助信息；
# 改变 panic 策略避免了栈展开代码的引入；
# Musl 工具链则提供了一个更精简的标准库实现。
# 从编译流程角度看，这些优化发生在不同的阶段：
#  LTO 在链接阶段工作，优化级别影响编译中期决策，而去除符号和 panic 策略则影响前期的代码生成策略。
#  这种多阶段的优化组合确保了最终生成的二进制文件既小巧又高效。

[profile.dev]
# ========== 开发环境编译速度优化 ==========
# 优化级别 0 = 最快编译速度 (推荐开发使用)
opt-level = 0
# 调试信息级别: 0=无, 1=仅行表, 2=完整
debug = 1
debug-assertions = true
overflow-checks = true
# 增量编译 - 开发环境必须启用
incremental = true
# 代码生成单元: 更多=并行度更高=编译更快
codegen-units = 256
# 使用 unwind panic 可以获得更好的调试信息
panic = "unwind"
# Rust 1.97: 开发环境使用分割调试信息（减小目标文件体积）
split-debuginfo = "unpacked"

# 开发环境构建优化 - 构建依赖使用轻量级优化
[profile.dev.build-override]
opt-level = 1
codegen-units = 16

[profile.test]
# ========== 测试环境编译速度优化 ==========
opt-level = 1
debug = 1
# 增量编译加速测试
codegen-units = 256
incremental = true

[profile.bench]
# ========== 基准测试优化 - 平衡编译和运行速度 ==========
opt-level = 3
debug = false
# 使用 thin LTO - 比 fat LTO 快很多，性能接近
lto = "thin"
# 更多代码生成单元 = 更快编译
codegen-units = 4
# 注意: bench profile 不支持 panic 设置

# 基准测试构建优化
[profile.bench.build-override]
opt-level = 2
codegen-units = 16

# ========== release 构建依赖优化 ==========
[profile.release.build-override]
opt-level = 2
codegen-units = 16

# ========== 新增: 快速发布 Profile ==========
# 使用: cargo build --profile release-fast
# 适用于: 需要快速编译但仍需要优化的场景
[profile.release-fast]
inherits = "release"
# 使用 thin LTO 替代 fat LTO，编译速度更快
lto = "thin"
# 增加 codegen-units 以提高并行度
codegen-units = 4
# 保持其他 release 优化
opt-level = 3
strip = "symbols"
panic = "abort"

[profile.release-fast.build-override]
opt-level = 2
codegen-units = 16

# ========== 新增: 最小体积 Profile ==========
# 使用: cargo build --profile size
# 适用于: 对二进制体积有严格要求的场景
[profile.size]
inherits = "release"
# 优化级别 z = 最小体积
opt-level = "z"
# 使用 fat LTO 获得最佳体积优化
lto = "fat"
# 单一 codegen-unit 获得最佳优化
codegen-units = 1
# 完全剥离符号
strip = true
panic = "abort"
# 禁用增量编译以获得最佳优化
incremental = false

[profile.size.build-override]
opt-level = 3
codegen-units = 1

# ========== 新增: 超快速检查 Profile ==========
# 使用: cargo check --profile check-fast
# 适用于: 快速语法检查，不运行代码
[profile.check-fast]
inherits = "dev"
opt-level = 0
debug = 0
codegen-units = 1024
panic = "abort"

# 工作区级别的依赖版本统一
# 2026-07-22: Rust 1.97.1 stable / 1.98.0-beta / 1.99.0-nightly 同步更新
# rust-version: 1.97.1
# 注意: 优先选择稳定成熟的版本，避免使用 alpha/RC 版本导致的破坏性变更
[workspace.dependencies]
# 本地 crate
common = { path = "crates/common", default-features = false }

# 2025-12-11: 网络和 HTTP 相关最新稳定版本
# reqwest: 高级HTTP客户端库，支持异步请求和JSON序列化
# 注意: reqwest 0.12.x 使用 "rustls-tls" 特性，0.13.x 使用 "rustls" 特性
reqwest = { version = "0.13.4", features = ["json", "rustls"] }
# hyper: 底层HTTP库，提供高性能的HTTP/1.1和HTTP/2支持
hyper = { version = "1.11.0", features = ["full"] }
# hyper-util: hyper的实用工具库，提供连接池和服务器功能
hyper-util = "0.1.20"
# hyper-rustls: hyper与rustls的集成，提供安全的TLS连接
# 2026-06-19: 修正为 0.27.9 (0.28.x 不存在/yanked，cargo 实际解析为 0.27.9)
hyper-rustls = "0.27.9"
# libp2p: P2P网络协议栈
# 2026-05-28: 已升级至 0.56.0，hickory-resolver 同步升级至 0.26.1，c10_networks DNS 模块已适配
libp2p = { version = "0.56.0", features = ["tokio", "tcp", "noise", "yamux", "gossipsub", "kad", "identify"] }
# multibase: 锁定 0.9.2，避免 0.9.3 引入 base45 传递依赖
# multiaddr -> multibase 默认会选择最新兼容版本；通过 workspace 依赖强制固定
multibase = "=0.9.2"
# hyper-tls: hyper与native-tls的集成，提供TLS支持
hyper-tls = "0.6.0"
# hyper-timeout: hyper的超时支持
# 2026-06-19: 修正为 0.5.2 (0.6.x 不存在/yanked，cargo 实际解析为 0.5.2)
hyper-timeout = "0.5.2"
# h2: HTTP/2协议的Rust实现
# 2026-06-19: 0.4.14 -> 0.4.15
h2 = "0.4.15"
# http: HTTP类型和特征的Rust实现
# 2026-06-19: 1.4.1 -> 1.4.2
http = "1.4.2"

# 2025-12-11: Web 框架最新稳定版本
# axum: 现代Web框架，专注于人体工程学和模块化设计
axum = { version = "0.8.9", features = ["macros", "multipart", "tracing"] }
# axum-core: axum的核心功能库 (与axum 0.8.x配套)
axum-core = "0.5.6"
# tower: 异步服务抽象层，提供中间件和超时支持
tower = "0.5.3"
# tower-http: tower的HTTP中间件集合
tower-http = { version = "0.6.11", features = [
    "cors",           # 跨域资源共享支持
    "trace",          # 请求追踪支持
    "timeout",        # 请求超时支持
    "compression-gzip", # Gzip压缩支持
] }
# actix-web: 高性能的Web框架，基于Actor模型
actix-web = "4.13.0"
# actix: Actor系统框架
actix = "0.13.5"
# actix-rt: actix的运行时支持
actix-rt = "2.11.0"

# 2026-06-29: 二线 Web 框架与模板引擎专题
# salvo: 现代 Rust Web 框架，强调高性能与可扩展性
# 2026-07-11: 0.93.0 -> 0.94.0 (cargo update 提示落后最新，c06_async 示例已验证)
# 2026-07-18: 0.94.0 -> 0.95.0 (cargo update)
salvo = "0.95.0"
# ntex: 可组合网络服务框架，与 actix-web 同源设计
ntex = { version = "3.10.1", features = ["tokio"] }
# askama: 类型安全、编译期 Jinja-like 模板引擎
askama = "0.16.0"
# maud: 编译期 HTML 模板宏，Rust-native DSL
maud = "0.27.0"

# 2025-09-27: 终端UI库最新稳定版本
# crossterm: 跨平台终端操作库，支持Windows、Linux和macOS
crossterm = "0.29.0"

# 2025-12-11: 前端框架 - 跨平台UI
# dioxus: 全栈Web框架，支持Web、桌面和移动应用开发
# 2026-04-24: 0.7.6 稳定版已发布，升级自 0.7.0-rc.0
dioxus = "0.7.6"
dioxus-web = "0.7.6"
# dioxus-desktop: 暂时禁用，存在GTK3安全漏洞
# leptos: 全栈同构Rust Web框架，利用细粒度响应性
leptos = "0.8.12"  # 更新至最新稳定版本
leptos_axum = "0.8.6"  # 更新至最新稳定版本

# 2025-12-11: 桌面应用框架 (Tauri 2.0已解决GTK3安全漏洞)
# tauri: 使用Web技术构建跨平台桌面应用的框架
tauri = "2.11.2"
# tauri-build: tauri的构建工具
tauri-build = "2.6.2"

# 2025-12-11: 其他异步生态常用依赖（统一版本）
# async-trait: 异步trait支持库
async-trait = "0.1.91"
# async-stream: 异步流处理库 (已移除，使用 tokio-stream 替代)
# async-stream = "0.3.6"  # 已移除，使用 tokio-stream 替代
# async-std 已移除，使用 tokio 替代
# tokio-console: tokio的控制台调试工具
tokio-console = "0.1.14"
# tokio-test: tokio的测试工具
tokio-test = "0.4.5"
# mio: 跨平台异步I/O库
# 2026-05-29: cargo update 1.2.0 -> 1.2.1
mio = "1.2.1"
# tungstenite: WebSocket协议的Rust实现
# 2026-03-28: 0.28.0 -> 0.29.0 (cargo update)
# 2026-07-18: 0.29.0 -> 0.30.0 (cargo update)
tungstenite = "0.30.0"
# rcgen: X.509证书生成库
# 2026-05-12: cargo update 0.14.7 -> 0.14.8
rcgen = "0.14.8"

# 2025-10-06: 基础依赖统一
# dotenvy: 环境变量管理库，dotenv的维护良好的分支
dotenvy = "0.15.7"
# tempfile: 临时文件和目录管理库
tempfile = "3.27.0"

# 2025-12-11: gRPC 相关最新稳定版本
# tonic: 高性能的gRPC over HTTP/2实现，专注于互操作性和灵活性
tonic = { version = "0.14.6", features = [
    "transport",        # 传输层支持
    "tls-ring",         # 使用ring的TLS支持
    "tls-webpki-roots", # WebPKI根证书支持
    "channel",          # 客户端通道支持
] }
# tonic-build: tonic的构建工具，用于生成gRPC代码
tonic-build = "0.14.6"
# tonic-prost: tonic与prost的集成
tonic-prost = "0.14.6"
tonic-prost-build = "0.14.6"
# prost: Protocol Buffers的Rust实现
# 2026-06-19: 0.14.3 -> 0.14.4
prost = "0.14.4"
# prost-build: prost的构建工具
prost-build = "0.14.4"
# prost-derive: prost的派生宏
prost-derive = "0.14.4"
# prost-types: prost的类型定义
prost-types = "0.14.4"

# 安全更新 - 修复protobuf安全漏洞 (RUSTSEC-2024-0437)
# 注意: workspace 依赖声明仅作记录，无法强制传递依赖版本。
#       Cargo.lock 中实际解析为 protobuf 3.7.2 (prometheus 0.14.0 传递依赖)。
#       真正修复需等待 prometheus 升级或使用 [patch.crates-io] 覆盖。
# 2026-06-19: 更新记录至 4.35.1-release (crates.io 最新版)
protobuf = "4.35.1-release"

# 2025-12-11: TLS 和加密最新稳定版本
# rustls: 现代TLS库，用Rust编写，提供高性能和安全性
# 2026-04-24: 0.23.38 -> 0.23.39 (cargo update，Rust 1.96.0 compatible)
# 2026-06-23: 0.23.40 -> 0.23.41 (cargo update)
# 2026-07-18: 0.23.41 -> 0.23.42 (cargo update，aws-lc-rs 同步升级)
rustls = "0.23.42"
# rustls-webpki: rustls的WebPKI支持
rustls-webpki = "0.103.13"
# tokio-rustls: tokio与rustls的集成
tokio-rustls = "0.26.4"
# ring: 加密原语库，提供高性能的加密算法实现
ring = "0.17.14"
# webpki-roots: WebPKI根证书集合
# 2026-06-19: 1.0.7 -> 1.0.8
webpki-roots = "1.0.9"

# 2025-12-11: 错误处理最新稳定版本
# thiserror: 错误类型派生宏库，简化错误处理
thiserror = "2.0.19"
# anyhow: 灵活的错误处理库，基于std::error::Error构建
# 2026-06-27: cargo update 1.0.102 -> 1.0.103
anyhow = "1.0.104"

# 2025-12-11: 序列化最新稳定版本
# serde: 通用序列化/反序列化框架，支持多种数据格式
serde = { version = "1.0.229", features = ["derive"] }
# serde_json: JSON序列化/反序列化支持
# 2026-07-20: cargo update 1.0.150 -> 1.0.151
serde_json = "1.0.151"
# serde_yaml: YAML序列化/反序列化支持
serde_yaml = "0.9.34"
# 二进制序列化 benchmark 已移除（避免引入额外依赖）
# 如需对比，可使用 workspace 已有的 serde_json 或自行引入 rmp-serde

# 2025-12-11: 异步运行时最新稳定版本
# tokio: 事件驱动的非阻塞I/O平台，用于编写异步I/O应用程序
# 2026-07-17: cargo update 1.52.4 -> 1.53.0
# 2026-07-21: cargo update 1.53.0 -> 1.53.1
tokio = { version = "1.53.1", features = ["full"] }
# tokio-util: tokio的实用工具库
# 2026-07-21: cargo update 0.7.18 -> 0.7.19
tokio-util = "0.7.19"
# tokio-stream: tokio的流处理支持
# 2026-07-22: cargo update 0.1.18 -> 0.1.19
tokio-stream = "0.1.19"
# tokio-tungstenite: tokio与tungstenite的集成，提供WebSocket支持
# 2026-03-28: 0.28.0 -> 0.29.0 (cargo update)
# 2026-07-18: 0.29.0 -> 0.30.0 (cargo update)
tokio-tungstenite = "0.30.0"
# socket2: 跨平台socket API封装，tokio/quinn/libp2p-tcp等传递依赖
# 2026-05-29: cargo update 0.6.3 -> 0.6.4
socket2 = "0.6.4"
# futures: 异步编程的基础库
futures = "0.3.33"
# futures-util: futures的实用工具库
futures-util = "0.3.33"

# 2025-12-11: 日志和追踪最新稳定版本
# tracing: 应用程序级别的追踪库，用于结构化日志记录
tracing = "0.1.44"
# tracing-subscriber: tracing的订阅者实现，支持多种输出格式
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "json"] }
# log: 标准日志库，提供简单的日志记录接口
# 2026-06-22: 0.4.32 -> 0.4.33 (cargo update)
log = "0.4.33"
# env_logger: log 的简单初始化封装（仅 c06_async 示例使用）
# 注意: env_logger 0.11.x 默认特性包含 humantime -> jiff -> defmt；
#       禁用 default-features 可阻止 env_logger 引入该路径。
#       jiff 当前仍由 kube / k8s-openapi 传递依赖引入，与 env_logger 无关。
env_logger = { version = "0.11.11", default-features = false, features = ["auto-color", "regex"] }
# prometheus: Prometheus指标收集库
prometheus = "0.14.0"
# tracing-opentelemetry: tracing与OpenTelemetry的集成 - 2025年10月最新版本
tracing-opentelemetry = "0.33.0"
# opentelemetry: OpenTelemetry的Rust实现
# 2026-05-28: 0.32.0 stable，与 opentelemetry_sdk 0.32.x 配套
opentelemetry = "0.32.0"
# opentelemetry_sdk: OpenTelemetry SDK
# 2026-05-28: 0.32.0 -> 0.32.1 (cargo update)
opentelemetry_sdk = { version = "0.32.1", features = ["rt-tokio"] }
# opentelemetry-otlp: OpenTelemetry OTLP导出器
# 2026-05-28: 0.32.0 stable，与 opentelemetry 0.32.x 配套
opentelemetry-otlp = { version = "0.32.0", features = ["http-json"] }
# opentelemetry-stdout: OpenTelemetry标准输出导出器
# 2026-05-28: 0.32.0 stable，与 opentelemetry 0.32.x 配套
opentelemetry-stdout = "0.32.0"
# opentelemetry-proto: OpenTelemetry协议缓冲区定义
# 2026-05-28: 0.32.0 stable，与 opentelemetry 0.32.x 配套
opentelemetry-proto = { version = "0.32.0", features = ["gen-tonic"] }

# 2025-09-27: 指标最新稳定版本
# metrics: 指标收集库，提供高性能的指标记录
metrics = "0.24.6"
# metrics-exporter-prometheus: metrics的Prometheus导出器
metrics-exporter-prometheus = { version = "0.18.3", default-features = false }

# 2025-12-25: 时间处理最新稳定版本
# chrono: 日期和时间处理库，支持多种日期格式和时区
# 2026-06-19: 0.4.44 -> 0.4.45
chrono = { version = "0.4.45", features = ["serde"] }
# time: 现代时间处理库，提供高性能的时间操作
# 2026-06-22: 0.3.49 -> 0.3.51 (cargo update)
# 2026-07-08: 0.3.51 -> 0.3.53 (cargo update)
# 2026-07-20: cargo update 0.3.53 -> 0.3.54
