# Internationalization terminology library for the rust-lang project.
# This file provides canonical English, Chinese, and Japanese translations for
# core Rust concepts. It is consumed by documentation and may be checked by
# maintenance scripts.
#
# Structure:
#   terms:
#     - en: English term
#       zh: Chinese translation
#       ja: Japanese translation
#       category: Conceptual category
#       notes: Usage notes and caveats

terms:
  - en: Ownership
    zh: 所有权
    ja: 所有権
    category: 所有权 / 借用
    notes: 已统一；避免与“财产权”混淆。

  - en: Borrowing
    zh: 借用
    ja: 借用
    category: 所有权 / 借用
    notes: 已统一；中文与日文同形。

  - en: Lifetime
    zh: 生命周期
    ja: ライフタイム
    category: 所有权 / 借用
    notes: 避免直译为“寿命”或“存続期間”的歧义。

  - en: Lifetime Subtyping
    zh: 生命周期子类型化
    ja: ライフタイム部分型
    category: 类型系统
    notes: 生命周期之间的子类型关系。

  - en: Lifetime Elision
    zh: 生命周期省略
    ja: ライフタイム省略
    category: 所有权 / 借用
    notes: 编译器推断生命周期标注的规则。

  - en: Trait
    zh: 特征 / Trait
    ja: トレイト
    category: 类型系统
    notes: 中文保留英文更常见；教材多译作“特征”。

  - en: Generic
    zh: 泛型
    ja: ジェネリック
    category: 类型系统
    notes: 与 Java/C# 术语一致。

  - en: Variance
    zh: 变型 / 变性
    ja: 変性
    category: 类型系统
    notes: _covariant / contravariant / invariant_ 分别译作协变/逆变/不变。

  - en: Coercion
    zh: 强制类型转换 / 强制转换
    ja: 型強制
    category: 类型系统
    notes: Rust 中多为隐式类型转换（如 Deref coercion）。

  - en: Orphan Rules
    zh: 孤儿规则
    ja: 孤児規則
    category: 类型系统
    notes: 限制 impl 的位置以避免冲突。

  - en: Deref
    zh: 解引用
    ja: デリファレンス
    category: 类型系统
    notes: "动词 deref 常用于运算符 `*` 的语义。"

  - en: Drop
    zh: 释放 / Drop
    ja: ドロップ
    category: 所有权 / 借用
    notes: 析构 trait，触发资源释放。

  - en: Copy
    zh: 复制 / Copy
    ja: コピー
    category: 所有权 / 借用
    notes: 按位复制语义；与 Clone 区分。

  - en: Move
    zh: 移动 / Move
    ja: ムーブ
    category: 所有权 / 借用
    notes: Rust 默认转移所有权。

  - en: Slice
    zh: 切片
    ja: スライス
    category: 类型系统
    notes: 动态大小类型（DST）的代表。

  - en: Pattern Matching
    zh: 模式匹配
    ja: パターンマッチ
    category: 控制流
    notes: match / if let 等结构的基础。

  - en: unsafe
    zh: 不安全 / unsafe
    ja: unsafe
    category: unsafe
    notes: 代码中保留英文；中文可称“不安全”。

  - en: Raw Pointer
    zh: 裸指针 / 原始指针
    ja: 生ポインタ
    category: unsafe
    notes: "`*const T` / `*mut T`，不受借用检查器约束。"

  - en: FFI
    zh: 外部函数接口 / FFI
    ja: FFI / 外部関数インターフェース
    category: unsafe
    notes: Foreign Function Interface 的缩写。

  - en: UB
    zh: 未定义行为 / UB
    ja: 未定義動作 / UB
    category: unsafe
    notes: Undefined Behavior 的缩写；unsafe 代码必须避免。

  - en: Send
    zh: Send
    ja: Send
    category: 并发安全
    notes: 标记 trait，允许跨线程转移所有权。

  - en: Sync
    zh: Sync
    ja: Sync
    category: 并发安全
    notes: 标记 trait，允许多线程共享引用。

  - en: Atomic
    zh: 原子
    ja: アトミック
    category: 并发安全
    notes: 无锁并发原语。

  - en: Mutex
    zh: 互斥锁 / Mutex
    ja: ミューテックス
    category: 并发安全
    notes: 互斥访问共享数据。

  - en: Channel
    zh: 通道
    ja: チャネル
    category: 并发安全
    notes: 线程/任务间消息传递。

  - en: Future
    zh: Future / 未来
    ja: Future
    category: 异步
    notes: 异步计算的占位符；代码中保留英文。

  - en: async/await
    zh: 异步/等待
    ja: 非同期/待機
    category: 异步
    notes: async 作关键字保留英文；await 在代码中保留。

  - en: Pin
    zh: 固定 / Pin
    ja: 固定 / Pin
    category: 异步
    notes: 保证值在内存中不移动。

  - en: Stream
    zh: 流 / Stream
    ja: ストリーム
    category: 异步
    notes: 异步迭代器；futures crate 中的核心 trait。

  - en: Executor
    zh: 执行器
    ja: エグゼキュータ
    category: 异步
    notes: 负责轮询 Future 的运行时组件。

  - en: Reactor
    zh: 反应器 / Reactor
    ja: リアクタ
    category: 异步
    notes: 处理 I/O 事件并唤醒任务的运行时组件。

  - en: Crate
    zh: 包 / crate
    ja: クレート
    category: 模块 / 包管理
    notes: Rust 编译单元；中文语境常用“crate”。

  - en: Module
    zh: 模块
    ja: モジュール
    category: 模块 / 包管理
    notes: 命名空间组织单元。

  - en: Workspace
    zh: 工作区 / Workspace
    ja: ワークスペース
    category: 模块 / 包管理
    notes: Cargo 管理多个 crate 的机制。

  - en: Feature
    zh: 特性 / Feature
    ja: フィーチャー
    category: 模块 / 包管理
    notes: Cargo 条件编译与可选依赖开关。

  - en: Edition
    zh: 版本 / Edition
    ja: Edition
    category: 语言版本
    notes: 注意与“版本号（1.x）”区分。

  - en: MSRV
    zh: 最低支持 Rust 版本 / MSRV
    ja: 最低サポート Rust バージョン / MSRV
    category: 语言版本
    notes: Minimum Supported Rust Version 的缩写。

  - en: Cargo.toml
    zh: Cargo.toml
    ja: Cargo.toml
    category: 模块 / 包管理
    notes: 包清单文件名，保留英文。
