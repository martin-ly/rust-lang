  - id: J-MODULE-07
    title_zh: 名称解析判定树
    title_en: Name Resolution Judgment Tree
    source:
      file: concept/00_meta/knowledge_topology/09_reasoning_judgment_tree_atlas.md
      anchor: "#71-名称解析判定树"
    covered_concepts: [ex:Modules, ex:NamesScopesAndResolution]
    rustc_error_codes: [E0433]
    nodes:
      - id: D
        type: condition
        label: "症状：名称解析失败（failed to resolve use of undeclared crate/module）"
        rustc_error_codes: [E0433]
      - id: Q1
        type: decision
        condition: "缺失项是否为外部 crate（路径以非 crate/self/super 名开头）？"
        quantitative: true
        threshold: "外部 crate 引用 ≥ 1 处"
      - id: Q2
        type: decision
        condition: "路径中是否存在拼写错误的段数 ≥1 个？"
        quantitative: true
        threshold: "拼写错误段数 ≥ 1"
      - id: Q3
        type: decision
        condition: "目标项所在模块的可见路径数是否 = 0（私有/未导入）？"
        quantitative: true
        threshold: "可见路径数 = 0"
      - {id: R1, type: conclusion, label: "根因：缺少依赖 / 未声明 extern crate"}
      - {id: R2, type: conclusion, label: "根因：路径拼写错误"}
      - {id: R3, type: conclusion, label: "根因：模块未声明或路径层级错误"}
      - {id: R4, type: conclusion, label: "根因：可见性不足（私有模块/项）"}
      - {id: F1, type: conclusion, label: "修复：在 Cargo.toml 添加依赖或声明 extern crate"}
      - {id: F2, type: conclusion, label: "修复：核对并修正路径拼写"}
      - {id: F3, type: conclusion, label: "修复：添加 mod 声明或调整路径层级"}
      - {id: F4, type: conclusion, label: "修复：使用 pub 提升可见性或使用 pub use 重导出"}
      - {id: V6, type: conclusion, label: "验证回边：cargo check"}
    edges:
      - {from: D, to: Q1, label: "入口"}
      - {from: Q1, to: R1, label: "是"}
      - {from: Q1, to: Q2, label: "否"}
      - {from: Q2, to: R2, label: "是"}
      - {from: Q2, to: Q3, label: "否"}
      - {from: Q3, to: R4, label: "是"}
      - {from: Q3, to: R3, label: "否"}
      - {from: R1, to: F1, label: "修复"}
      - {from: R2, to: F2, label: "修复"}
      - {from: R3, to: F3, label: "修复"}
      - {from: R4, to: F4, label: "修复"}
      - {from: F1, to: V6, label: "验证"}
      - {from: F2, to: V6, label: "验证"}
      - {from: F3, to: V6, label: "验证"}
      - {from: F4, to: V6, label: "验证"}

