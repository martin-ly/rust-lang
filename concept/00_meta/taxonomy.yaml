  - id: unsafe_lowlevel
    name_zh: Unsafe 与底层
    name_en: Unsafe & Low-level
    description: >
      unsafe Rust、FFI、内联汇编、底层模式、unsafe 内部机制、自定义分配器、零拷贝。
    path_prefixes:
      - "03_advanced/02_unsafe/"
      - "03_advanced/04_ffi/"
      - "03_advanced/05_inline_assembly/"
      - "03_advanced/06_low_level_patterns/"
      - "03_advanced/07_unsafe_internals/"
      - "03_advanced/README.md"
    representative_concepts: [SafeAndEffectiveUnsafeRust, ForeignFunctionInterfaceFFI, CustomAllocators]

  - id: formal_methods
    name_zh: 形式化方法
    name_en: Formal Methods
    description: >
      类型论、所有权逻辑、分离逻辑、操作语义、模型检查、rustc 内部与形式化记号。
    path_prefixes:
      - "04_formal/"
    representative_concepts: [TypeTheory, LinearLogic, MiriRustUndefinedBehaviorDetector, KaniRustBoundedModelChecker]

  - id: comparative
    name_zh: 跨语言比较
    name_en: Comparative
    description: >
      编程范式比较、系统语言与托管语言对比、领域对比研究。
    path_prefixes:
