  - id: ecosystem_toolchain
    name_zh: 生态·工具链
    name_en: Ecosystem Toolchain
    description: >
      Rust 工具链、Cargo 构建系统、核心 crate 生态。
    path_prefixes:
      - "06_ecosystem/00_toolchain/"
      - "06_ecosystem/01_cargo/"
      - "06_ecosystem/02_core_crates/"
      - "06_ecosystem/README.md"
    representative_concepts: [Toolchain, CargoBuildStd, CoreCrates]

  - id: ecosystem_design
    name_zh: 生态·设计与质量
    name_en: Ecosystem Design & Quality
    description: >
      设计模式、系统可组合性、测试与质量保障、性能优化。
