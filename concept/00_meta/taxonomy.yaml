    path_prefixes:
      - "06_ecosystem/05_systems_and_embedded/"
    representative_concepts: [CrossCompilation, CLIDevelopment]

  - id: ecosystem_data
    name_zh: 生态·数据与分布式
    name_en: Ecosystem Data & Distributed
    description: >
      数据库访问、数据处理、分布式系统。
    path_prefixes:
      - "06_ecosystem/06_data_and_distributed/"
    representative_concepts: [DatabaseAccess]

  - id: ecosystem_security
    name_zh: 生态·安全与验证
    name_en: Ecosystem Security & Verification
    description: >
      安全实践、密码学、形式化验证工具链。
    path_prefixes:
      - "06_ecosystem/07_security_and_cryptography/"
      - "06_ecosystem/08_formal_verification/"
    representative_concepts: [SecurityPractices_07securityan, FormalMethods_08formalveri]

  - id: ecosystem_domains
    name_zh: 生态·领域应用
    name_en: Ecosystem Domain Applications
    description: >
      领域应用：游戏开发、算法竞赛、数据结构、AI 集成等。
    path_prefixes:
      - "06_ecosystem/11_domain_applications/"
    representative_concepts: [ApplicationDomains, GameDevelopment_11domainappl_1, AlgorithmsCompetitiveProgramming]

  - id: version_evolution
    name_zh: 版本演进
    name_en: Version Evolution
    description: >
      Rust 版本跟踪、Edition 路线图、已稳定/预览特性、研究与实验方向。
    path_prefixes:
      - "07_future/"
    representative_concepts: [Rust191StabilizedFeatures, Rust193StabilizedFeatures, ConstTraitImplPreview]

  - id: uncategorized
    name_zh: 未分类
    name_en: Uncategorized
    description: >
      兜底领域：未命中任何 path_prefixes 的实体。正常情况下应为空；
      非空意味着 concept/ 新增目录未同步到本文件，属于治理待办。
    path_prefixes: []
    representative_concepts: []

# ---------------------------------------------------------------------------
# 三、层 × 领域矩阵生成规则
# ---------------------------------------------------------------------------
matrix_rules:
  description: >
    层 × 领域矩阵 M[L][D] = 同时满足 layer(entity)=L 且 domain(entity)=D 的实体集合，
    用于覆盖率审计、跨层引用分析与学习路径生成。
  layer_inference: >
    layer = layers 中 directory == path 第一段 的条目；
    根目录散落文件按 layers[*].extra_prefixes 匹配，默认 L0。
  domain_inference: >
    domain = 所有 domain.path_prefixes 中最长匹配 path 的前缀所属 domain；
    无匹配时 domain = fallback_domain（uncategorized）。
  expectations:
    - "每个实体恰好属于一个 layer 与一个 domain（单值，非多标签）。"
    - "对角线附近应稠密：如 (L1, ownership_memory)、(L4, formal_methods)、(L7, version_evolution)。"
    - "跨层同领域（如 ownership_memory 在 L1/L2/L4 均有实体）是预期的跨层映射信号，"
    - "uncategorized 行/列必须为空；非空即 taxonomy.yaml 与 concept/ 目录结构失同步。"
  consumers:
    - scripts/add_kg_layer_domain.py
    - scripts/check_kg_shapes.py
