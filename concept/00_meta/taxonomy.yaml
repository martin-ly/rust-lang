      - "06_ecosystem/09_networking/"
    representative_concepts: [NetworkProtocols, HighPerformanceNetworkServiceArchitecture, WebAssembly]

  - id: ecosystem_embedded
    name_zh: 生态·系统与嵌入式
    name_en: Ecosystem Systems & Embedded
    description: >
