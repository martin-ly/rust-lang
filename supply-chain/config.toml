# cargo-vet 供应链审计配置
# 
# cargo-vet 用于验证 crate 的来源和审计状态
# 用法:
#   cargo vet init      # 初始化（已配置，无需运行）
#   cargo vet           # 检查所有依赖是否已审计
#   cargo vet suggest   # 建议需要审计的 crate
#   cargo vet certify   # 审计一个 crate
#
# 参考: https://mozilla.github.io/cargo-vet/

[imports.mozilla]
url = "https://raw.githubusercontent.com/mozilla/supply-chain/main/imports.lock"

[criteria.license]
description = "Licensed under a permissive open-source license (MIT/Apache-2.0)"

[criteria.safe-to-deploy]
description = "Safe to deploy in production — code reviewed for security vulnerabilities"

[criteria.safe-to-run]
description = "Safe to run in CI/development — no obvious malicious code"

[policy.default]
criteria = ["license", "safe-to-deploy"]

