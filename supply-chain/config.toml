# cargo-vet 供应链审计配置
#
# cargo-vet 用于验证 crate 的来源和审计状态
# 用法:
#   cargo vet           # 检查所有依赖是否已审计
#   cargo vet suggest   # 建议需要审计的 crate
#   cargo vet certify   # 审计一个 crate
#
# 参考: https://mozilla.github.io/cargo-vet/config.html

[criteria.safe-to-run]
description = "Safe to run in CI/development — no obvious malicious code"

[criteria.safe-to-deploy]
description = "Safe to deploy in production — code reviewed for security vulnerabilities"
implies = "safe-to-run"

# 本地 workspace crate 免检（第一方代码）
[policy.c01_ownership_borrow_scope]
criteria = []
audit-as-crates-io = false

