
# cargo-vet audits file

[[audits.bare-metal]]
criteria = "safe-to-deploy"
version = "0.2.5"
notes = 'Formal audit stub for RUSTSEC-2026-0110. bare-metal is only pulled in by c13_embedded when target_arch = "arm"; it is not compiled on the host. Risk is limited to embedded targets and the crate is a low-level target-abstraction library with no network or crypto surface.'

[[audits.candle-core]]
criteria = "safe-to-run"
version = "0.11.0"
notes = "2026-07-11: candle-core 0.11.0 (huggingface/candle 官方维护) 用于 c08_algorithms 的 AI/ML 示例；不处理网络输入，攻击面限于本地模型权重加载。"

[[audits.candle-nn]]
criteria = "safe-to-run"
version = "0.11.0"
notes = "2026-07-11: candle-nn 0.11.0 (huggingface/candle 官方维护) 为 candle-core 的神经网络扩展，仅用于 c08 示例。"

[[audits.cc]]
criteria = "safe-to-run"
version = "1.2.67"
notes = "2026-07-11: cc 1.2.67 (rust-lang/cc-rs 官方维护) 为构建脚本通用 C 编译驱动，patch 升级 (1.2.66->1.2.67)，仅构建期执行。"

[[audits.hickory-proto]]
criteria = "safe-to-deploy"
version = "0.25.2"
notes = "Formal audit stub for RUSTSEC-2026-0118/0119. hickory-proto 0.25.2 is only a Cargo.lock residual and not part of the active compilation graph; the project does not enable mdns, so the DNS proof-validation issue is not exploitable here. Replace with a real audit or upgrade once libp2p >0.56.0 is available."

[[audits.instant]]
criteria = "safe-to-deploy"
version = "0.1.13"
notes = "Formal audit stub for RUSTSEC-2024-0384. instant is a time-utility crate used only by the experimental glommio module in c06_async on Linux. It is not exposed to untrusted input and has no security-sensitive surface in this project."

[[audits.paste]]
criteria = "safe-to-deploy"
version = "1.0.15"
notes = "Formal audit stub for RUSTSEC-2024-0436. paste is a compile-time proc-macro helper used transitively by dev/benchmark dependencies (candle-core, libp2p, tokenizers, etc.). It has no runtime attack surface in this project."

