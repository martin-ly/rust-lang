<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text { font-family: Arial, sans-serif; font-size: 11px; }
      .code { font-family: monospace; font-size: 10px; }
      .stack { fill: #e8f5e9; stroke: #2e7d32; }
      .heap { fill: #fff3e0; stroke: #ef6c00; }
      .static { fill: #e3f2fd; stroke: #1976d2; }
      .padding { fill: #ffcdd2; stroke: #c62828; stroke-dasharray: 3,3; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="400" y="25" class="title">Rust内存布局与对齐</text>

  <!-- Example 1: Simple struct -->
  <g transform="translate(30, 50)">
    <text x="0" y="0" class="subtitle">例1: 基本结构体</text>
    <text x="0" y="18" class="code">struct Point { x: u8, y: u32 }</text>
    
    <g transform="translate(0, 30)">
      <!-- Memory layout -->
      <rect x="0" y="0" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="30" y="20" text-anchor="middle" class="text">x: u8</text>
      
      <rect x="60" y="0" width="60" height="30" class="padding"/>
      <text x="90" y="20" text-anchor="middle" class="text">[pad]</text>
      
      <rect x="120" y="0" width="120" height="30" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="180" y="20" text-anchor="middle" class="text">y: u32</text>
      
      <!-- Labels -->
      <text x="30" y="50" text-anchor="middle" class="text">1 byte</text>
      <text x="90" y="50" text-anchor="middle" class="text">3 bytes</text>
      <text x="180" y="50" text-anchor="middle" class="text">4 bytes</text>
      
      <!-- Total -->
      <text x="120" y="75" text-anchor="middle" class="text">总大小: 8 bytes (对齐: 4)</text>
    </g>
  </g>

  <!-- Example 2: Optimized struct -->
  <g transform="translate(30, 150)">
    <text x="0" y="0" class="subtitle">例2: 优化后结构体</text>
    <text x="0" y="18" class="code">struct PointOpt { y: u32, x: u8 }</text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="120" height="30" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="60" y="20" text-anchor="middle" class="text">y: u32</text>
      
      <rect x="120" y="0" width="30" height="30" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="135" y="20" text-anchor="middle" class="text">x</text>
      
      <rect x="150" y="0" width="90" height="30" class="padding"/>
      <text x="195" y="20" text-anchor="middle" class="text">[padding]</text>
      
      <text x="120" y="60" text-anchor="middle" class="text">总大小: 8 bytes (但更高效)</text>
    </g>
  </g>

  <!-- Example 3: Vec layout -->
  <g transform="translate(30, 250)">
    <text x="0" y="0" class="subtitle">例3: Vec&lt;T&gt; 内存布局</text>
    <text x="0" y="18" class="code">vec![1, 2, 3]</text>
    
    <g transform="translate(0, 30)">
      <!-- Stack part -->
      <rect x="0" y="0" width="100" height="80" class="stack" stroke-width="2"/>
      <text x="50" y="20" text-anchor="middle" class="subtitle">Stack</text>
      
      <rect x="10" y="30" width="80" height="15" fill="white" stroke="#2e7d32"/>
      <text x="50" y="41" text-anchor="middle" class="code">ptr -&gt;</text>
      
      <rect x="10" y="48" width="80" height="12" fill="white" stroke="#2e7d32"/>
      <text x="50" y="57" text-anchor="middle" class="code">len: 3</text>
      
      <rect x="10" y="63" width="80" height="12" fill="white" stroke="#2e7d32"/>
      <text x="50" y="72" text-anchor="middle" class="code">cap: 3+</text>
      
      <!-- Arrow to heap -->
      <line x1="90" y1="37" x2="140" y2="37" stroke="#333" stroke-width="2"/>
      <polygon points="140,37 135,34 135,40" fill="#333"/>
      
      <!-- Heap part -->
      <rect x="150" y="0" width="180" height="80" class="heap" stroke-width="2"/>
      <text x="240" y="20" text-anchor="middle" class="subtitle">Heap</text>
      
      <rect x="160" y="30" width="50" height="40" fill="white" stroke="#ef6c00"/>
      <text x="185" y="55" text-anchor="middle" class="text">1</text>
      
      <rect x="215" y="30" width="50" height="40" fill="white" stroke="#ef6c00"/>
      <text x="240" y="55" text-anchor="middle" class="text">2</text>
      
      <rect x="270" y="30" width="50" height="40" fill="white" stroke="#ef6c00"/>
      <text x="295" y="55" text-anchor="middle" class="text">3</text>
      
      <text x="240" y="95" text-anchor="middle" class="text">连续内存块</text>
    </g>
  </g>

  <!-- Example 4: String layout -->
  <g transform="translate(30, 370)">
    <text x="0" y="0" class="subtitle">例4: String 内存布局</text>
    <text x="0" y="18" class="code">String::from("hello")</text>
    
    <g transform="translate(0, 30)">
      <!-- Stack -->
      <rect x="0" y="0" width="100" height="80" class="stack" stroke-width="2"/>
      <text x="50" y="20" text-anchor="middle" class="subtitle">Stack</text>
      
      <rect x="10" y="30" width="80" height="15" fill="white" stroke="#2e7d32"/>
      <text x="50" y="41" text-anchor="middle" class="code">ptr</text>
      
      <rect x="10" y="48" width="80" height="12" fill="white" stroke="#2e7d32"/>
      <text x="50" y="57" text-anchor="middle" class="code">len: 5</text>
      
      <rect x="10" y="63" width="80" height="12" fill="white" stroke="#2e7d32"/>
      <text x="50" y="72" text-anchor="middle" class="code">cap: 5+</text>
      
      <!-- Heap -->
      <rect x="150" y="0" width="150" height="80" class="heap" stroke-width="2"/>
      <text x="225" y="20" text-anchor="middle" class="subtitle">Heap</text>
      
      <rect x="160" y="35" width="20" height="30" fill="white" stroke="#ef6c00"/>
      <text x="170" y="55" text-anchor="middle" class="text">h</text>
      
      <rect x="185" y="35" width="20" height="30" fill="white" stroke="#ef6c00"/>
      <text x="195" y="55" text-anchor="middle" class="text">e</text>
      
      <rect x="210" y="35" width="20" height="30" fill="white" stroke="#ef6c00"/>
      <text x="220" y="55" text-anchor="middle" class="text">l</text>
      
      <rect x="235" y="35" width="20" height="30" fill="white" stroke="#ef6c00"/>
      <text x="245" y="55" text-anchor="middle" class="text">l</text>
      
      <rect x="260" y="35" width="20" height="30" fill="white" stroke="#ef6c00"/>
      <text x="270" y="55" text-anchor="middle" class="text">o</text>
    </g>
  </g>

  <!-- Example 5: Enum layout -->
  <g transform="translate(400, 250)">
    <text x="0" y="0" class="subtitle">例5: Enum 内存布局</text>
    <text x="0" y="18" class="code">Option&lt;Box&lt;T&gt;&gt; - 空指针优化</text>
    
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="60" height="80" class="stack" stroke-width="2"/>
      <text x="30" y="20" text-anchor="middle" class="subtitle">Stack</text>
      
      <!-- None representation -->
      <rect x="10" y="35" width="40" height="30" fill="#ffcdd2" stroke="#c62828"/>
      <text x="30" y="55" text-anchor="middle" class="code">null</text>
      
      <text x="80" y="55" class="text">None 表示为 null</text>
      
      <!-- Some representation -->
      <rect x="0" y="90" width="60" height="80" class="stack" stroke-width="2"/>
      <rect x="10" y="105" width="40" height="30" fill="white" stroke="#2e7d32"/>
      <text x="30" y="125" text-anchor="middle" class="code">addr</text>
      
      <text x="80" y="125" class="text">Some 存储指针</text>
      
      <text x="30" y="195" text-anchor="middle" class="text">大小 = 8 bytes</text>
      <text x="30" y="210" text-anchor="middle" class="text">(而非 16 bytes)</text>
    </g>
  </g>

  <!-- Alignment rules -->
  <g transform="translate(400, 50)">
    <text x="0" y="0" class="subtitle">对齐规则</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="350" height="180" fill="#f5f5f5" stroke="#999" rx="5"/>
      
      <text x="10" y="25" class="text">• 基本类型对齐 = 大小 (u32=4)</text>
      <text x="10" y="45" class="text">• 结构体对齐 = 最大成员对齐</text>
      <text x="10" y="65" class="text">• 结构体大小 = 对齐的倍数</text>
      
      <text x="10" y="95" class="code">#[repr(C)] - C兼容布局</text>
      <text x="10" y="115" class="code">#[repr(packed)] - 无填充</text>
      <text x="10" y="135" class="code">#[repr(align(N))] - 强制对齐</text>
      
      <text x="10" y="160" class="text">使用 mem::size_of::&lt;T&gt;() 查询</text>
    </g>
  </g>

  <!-- Size comparison table -->
  <g transform="translate(400, 480)">
    <text x="0" y="0" class="subtitle">常见类型大小 (64-bit)</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="350" height="140" fill="#fafafa" stroke="#999" rx="5"/>
      
      <!-- Header -->
      <rect x="10" y="10" width="160" height="20" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="90" y="24" text-anchor="middle" class="text">类型</text>
      
      <rect x="170" y="10" width="80" height="20" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="210" y="24" text-anchor="middle" class="text">大小</text>
      
      <rect x="250" y="10" width="90" height="20" fill="#e3f2fd" stroke="#1976d2"/>
      <text x="295" y="24" text-anchor="middle" class="text">对齐</text>
      
      <!-- Rows -->
      <rect x="10" y="30" width="160" height="20" fill="white" stroke="#ddd"/>
      <text x="90" y="44" text-anchor="middle" class="code">()</text>
      <rect x="170" y="30" width="80" height="20" fill="white" stroke="#ddd"/>
      <text x="210" y="44" text-anchor="middle" class="text">0</text>
      <rect x="250" y="30" width="90" height="20" fill="white" stroke="#ddd"/>
      <text x="295" y="44" text-anchor="middle" class="text">1</text>
      
      <rect x="10" y="50" width="160" height="20" fill="white" stroke="#ddd"/>
      <text x="90" y="64" text-anchor="middle" class="code">u8, i8, bool</text>
      <rect x="170" y="50" width="80" height="20" fill="white" stroke="#ddd"/>
      <text x="210" y="64" text-anchor="middle" class="text">1</text>
      <rect x="250" y="50" width="90" height="20" fill="white" stroke="#ddd"/>
      <text x="295" y="64" text-anchor="middle" class="text">1</text>
      
      <rect x="10" y="70" width="160" height="20" fill="white" stroke="#ddd"/>
      <text x="90" y="84" text-anchor="middle" class="code">u32, i32, f32</text>
      <rect x="170" y="70" width="80" height="20" fill="white" stroke="#ddd"/>
      <text x="210" y="84" text-anchor="middle" class="text">4</text>
      <rect x="250" y="70" width="90" height="20" fill="white" stroke="#ddd"/>
      <text x="295" y="84" text-anchor="middle" class="text">4</text>
      
      <rect x="10" y="90" width="160" height="20" fill="white" stroke="#ddd"/>
      <text x="90" y="104" text-anchor="middle" class="code">u64, i64, f64, *T</text>
      <rect x="170" y="90" width="80" height="20" fill="white" stroke="#ddd"/>
      <text x="210" y="104" text-anchor="middle" class="text">8</text>
      <rect x="250" y="90" width="90" height="20" fill="white" stroke="#ddd"/>
      <text x="295" y="104" text-anchor="middle" class="text">8</text>
      
      <rect x="10" y="110" width="160" height="20" fill="white" stroke="#ddd"/>
      <text x="90" y="124" text-anchor="middle" class="code">&amp;str, &amp;[T]</text>
      <rect x="170" y="110" width="80" height="20" fill="white" stroke="#ddd"/>
      <text x="210" y="124" text-anchor="middle" class="text">16</text>
      <rect x="250" y="110" width="90" height="20" fill="white" stroke="#ddd"/>
      <text x="295" y="124" text-anchor="middle" class="text">8</text>
    </g>
  </g>
</svg>
