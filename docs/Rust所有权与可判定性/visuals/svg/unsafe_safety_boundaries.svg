<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .text { font-family: Arial, sans-serif; font-size: 12px; }
      .code { font-family: monospace; font-size: 11px; }
      .safe-zone { fill: #e8f5e9; stroke: #2e7d32; }
      .unsafe-zone { fill: #ffebee; stroke: #c62828; }
      .boundary { fill: #fff3e0; stroke: #ef6c00; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="400" y="25" class="title">Safe/Unsafe边界与安全抽象</text>

  <!-- Safe Zone -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="300" height="400" class="safe-zone" stroke-width="2" rx="10"/>
    <text x="150" y="25" text-anchor="middle" class="subtitle">Safe Rust</text>
    
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="260" height="60" fill="white" stroke="#2e7d32" rx="5"/>
      <text x="130" y="20" text-anchor="middle" class="subtitle" font-size="12">编译器保证</text>
      <text x="10" y="40" class="text">• 无悬垂指针</text>
      <text x="10" y="55" class="text">• 无数据竞争</text>
    </g>
    
    <g transform="translate(20, 115)">
      <rect x="0" y="0" width="260" height="80" fill="white" stroke="#2e7d32" rx="5"/>
      <text x="130" y="20" text-anchor="middle" class="subtitle" font-size="12">安全API示例</text>
      <text x="10" y="40" class="code">Vec::get(index)</text>
      <text x="10" y="58" class="text">返回Option，边界检查</text>
      <text x="10" y="73" class="code">String::from_utf8</text>
    </g>
    
    <g transform="translate(20, 205)">
      <rect x="0" y="0" width="260" height="90" fill="white" stroke="#2e7d32" rx="5"/>
      <text x="130" y="20" text-anchor="middle" class="subtitle" font-size="12">类型系统</text>
      <text x="10" y="40" class="text">• 所有权检查</text>
      <text x="10" y="58" class="text">• 借用规则</text>
      <text x="10" y="76" class="text">• Send/Sync自动推导</text>
    </g>
    
    <g transform="translate(20, 305)">
      <rect x="0" y="0" width="260" height="80" fill="#c8e6c9" stroke="#2e7d32" rx="5"/>
      <text x="130" y="20" text-anchor="middle" class="subtitle" font-size="12">用户代码</text>
      <text x="10" y="40" class="code">fn main() {</text>
      <text x="10" y="55" class="code">  let v = vec![1,2,3];</text>
      <text x="10" y="70" class="code">}</text>
    </g>
  </g>

  <!-- Boundary -->
  <g transform="translate(370, 50)">
    <rect x="0" y="0" width="80" height="400" class="boundary" stroke-width="2" stroke-dasharray="10,5" rx="5"/>
    <text x="40" y="30" text-anchor="middle" class="subtitle" transform="rotate(-90, 40, 200)">安全边界</text>
    
    <g transform="translate(10, 80)">
      <rect x="0" y="0" width="60" height="100" fill="white" stroke="#ef6c00" rx="5"/>
      <text x="30" y="40" text-anchor="middle" class="text" font-size="10">unsafe</text>
      <text x="30" y="55" text-anchor="middle" class="text" font-size="10">块</text>
      <text x="30" y="80" text-anchor="middle" class="code" font-size="9">unsafe { }</text>
    </g>
    
    <g transform="translate(10, 200)">
      <rect x="0" y="0" width="60" height="100" fill="white" stroke="#ef6c00" rx="5"/>
      <text x="30" y="40" text-anchor="middle" class="text" font-size="10">unsafe</text>
      <text x="30" y="55" text-anchor="middle" class="text" font-size="10">函数</text>
      <text x="30" y="80" text-anchor="middle" class="code" font-size="9">unsafe fn</text>
    </g>
  </g>

  <!-- Unsafe Zone -->
  <g transform="translate(470, 50)">
    <rect x="0" y="0" width="280" height="400" class="unsafe-zone" stroke-width="2" rx="10"/>
    <text x="140" y="25" text-anchor="middle" class="subtitle">Unsafe Rust</text>
    
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="240" height="100" fill="white" stroke="#c62828" rx="5"/>
      <text x="120" y="20" text-anchor="middle" class="subtitle" font-size="12">unsafe能力</text>
      <text x="10" y="40" class="code">• 解引用原始指针 *const T</text>
      <text x="10" y="58" class="code">• 调用unsafe函数</text>
      <text x="10" y="76" class="code">• 访问union字段</text>
      <text x="10" y="91" class="code">• 调用FFI外部函数</text>
    </g>
    
    <g transform="translate(20, 155)">
      <rect x="0" y="0" width="240" height="120" fill="white" stroke="#c62828" rx="5"/>
      <text x="120" y="20" text-anchor="middle" class="subtitle" font-size="12">程序员责任</text>
      <text x="10" y="40" class="text">必须保证:</text>
      <text x="10" y="58" class="text">• 原始指针有效且对齐</text>
      <text x="10" y="76" class="text">• 无数据竞争</text>
      <text x="10" y="94" class="text">• 满足类型不变量</text>
      <text x="10" y="112" class="text">• 不违反借用规则</text>
    </g>
    
    <g transform="translate(20, 285)">
      <rect x="0" y="0" width="240" height="100" fill="#ffcdd2" stroke="#c62828" rx="5"/>
      <text x="120" y="20" text-anchor="middle" class="subtitle" font-size="12">实现示例</text>
      <text x="10" y="40" class="code">unsafe impl Send for MyType {}</text>
      <text x="10" y="58" class="code">std::slice::from_raw_parts</text>
      <text x="10" y="76" class="code">Box::from_raw</text>
      <text x="10" y="91" class="code">std::ptr::read/write</text>
    </g>
  </g>

  <!-- Bottom: Safety Invariant -->
  <g transform="translate(50, 470)">
    <rect x="0" y="0" width="700" height="60" fill="#e3f2fd" stroke="#1976d2" rx="5"/>
    <text x="350" y="20" text-anchor="middle" class="subtitle">安全抽象原则</text>
    <text x="350" y="40" text-anchor="middle" class="text">unsafe代码必须封装在安全API中，确保任何safe代码的使用都不会触发UB</text>
    <text x="350" y="55" text-anchor="middle" class="code">pub fn safe_api() { unsafe { /* 内部实现 */ } }  // 封装unsafe细节</text>
  </g>
</svg>
