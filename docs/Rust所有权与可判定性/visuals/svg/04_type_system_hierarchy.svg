<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="midGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1565c0">Rust类型系统层次结构</text>
  
  <!-- Top Level: Trait System -->
  <rect x="50" y="70" width="800" height="100" rx="10" fill="url(#topGrad)" stroke="#388e3c" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b5e20">Trait系统</text>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#2e7d32">定义共享行为 / 接口抽象 / 特化</text>
  <text x="450" y="150" text-anchor="middle" font-size="11" fill="#555">Send | Sync | Drop | Copy | Clone | Deref | ...</text>
  
  <!-- Middle Level: Generic Types -->
  <rect x="50" y="190" width="800" height="100" rx="10" fill="url(#midGrad)" stroke="#1565c0" stroke-width="2"/>
  <text x="450" y="220" text-anchor="middle" font-size="18" font-weight="bold" fill="#0d47a1">泛型系统</text>
  <text x="450" y="245" text-anchor="middle" font-size="12" fill="#1565c0">类型参数化 / 单态化 / 约束</text>
  <text x="450" y="270" text-anchor="middle" font-size="11" fill="#555">fn f&lt;T&gt;(x: T) | Vec&lt;T&gt; | Result&lt;T, E&gt; | const N: usize</text>
  
  <!-- Bottom Level: Concrete Types -->
  <rect x="50" y="310" width="800" height="280" rx="10" fill="url(#botGrad)" stroke="#ef6c00" stroke-width="2"/>
  <text x="450" y="340" text-anchor="middle" font-size="18" font-weight="bold" fill="#e65100">具体类型</text>
  <text x="450" y="365" text-anchor="middle" font-size="12" fill="#ef6c00">所有权语义的核心载体</text>
  
  <!-- Concrete Type Categories -->
  
  <!-- Scalar Types -->
  <rect x="80" y="390" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">标量类型</text>
  <text x="155" y="435" text-anchor="middle" font-size="11" fill="#555">i32, u64, f64</text>
  <text x="155" y="450" text-anchor="middle" font-size="11" fill="#555">bool, char</text>
  <text x="155" y="465" text-anchor="middle" font-size="10" fill="#888">impl Copy</text>
  
  <!-- Compound Types -->
  <rect x="260" y="390" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="335" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">复合类型</text>
  <text x="335" y="435" text-anchor="middle" font-size="11" fill="#555">struct, enum</text>
  <text x="335" y="450" text-anchor="middle" font-size="11" fill="#555">tuple, array</text>
  <text x="335" y="465" text-anchor="middle" font-size="10" fill="#888">默认 Affine</text>
  
  <!-- Pointer Types -->
  <rect x="440" y="390" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="515" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">指针类型</text>
  <text x="515" y="435" text-anchor="middle" font-size="11" fill="#555">&amp;T, &amp;mut T</text>
  <text x="515" y="450" text-anchor="middle" font-size="11" fill="#555">Box&lt;T&gt;, *const T</text>
  <text x="515" y="465" text-anchor="middle" font-size="10" fill="#888">borrow语义</text>
  
  <!-- Function Types -->
  <rect x="620" y="390" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="695" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">函数类型</text>
  <text x="695" y="435" text-anchor="middle" font-size="11" fill="#555">fn(T) -&gt; U</text>
  <text x="695" y="450" text-anchor="middle" font-size="11" fill="#555">closure |x| x+1</text>
  <text x="695" y="465" text-anchor="middle" font-size="10" fill="#888">Fn, FnMut, FnOnce</text>
  
  <!-- Smart Pointers -->
  <rect x="170" y="490" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">智能指针</text>
  <text x="245" y="535" text-anchor="middle" font-size="11" fill="#555">Box&lt;T&gt;, Rc&lt;T&gt;</text>
  <text x="245" y="550" text-anchor="middle" font-size="11" fill="#555">Arc&lt;T&gt;</text>
  <text x="245" y="565" text-anchor="middle" font-size="10" fill="#888">堆内存管理</text>
  
  <!-- Interior Mutability -->
  <rect x="375" y="490" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">内部可变性</text>
  <text x="450" y="535" text-anchor="middle" font-size="11" fill="#555">Cell&lt;T&gt;, RefCell&lt;T&gt;</text>
  <text x="450" y="550" text-anchor="middle" font-size="11" fill="#555">Mutex&lt;T&gt;, RwLock&lt;T&gt;</text>
  <text x="450" y="565" text-anchor="middle" font-size="10" fill="#888">运行时检查</text>
  
  <!-- Special Types -->
  <rect x="580" y="490" width="150" height="80" rx="8" fill="white" stroke="#ff9800" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">特殊类型</text>
  <text x="655" y="535" text-anchor="middle" font-size="11" fill="#555">PhantomData&lt;T&gt;</text>
  <text x="655" y="550" text-anchor="middle" font-size="11" fill="#555">PhantomPinned</text>
  <text x="655" y="565" text-anchor="middle" font-size="10" fill="#888">标记类型</text>
  
  <!-- Ownership Flow -->
  <line x1="450" y1="170" x2="450" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="290" x2="450" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="610" width="800" height="30" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="450" y="630" text-anchor="middle" font-size="12" fill="#1565c0">
    从Trait到具体类型：抽象程度递减，所有权语义逐渐明确
  </text>
</svg>
