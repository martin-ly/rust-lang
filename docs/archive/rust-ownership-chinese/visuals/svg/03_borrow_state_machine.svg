<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcdd2;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565c0">RefCell运行时借用状态机</text>
  
  <!-- States -->
  
  <!-- Unused State -->
  <ellipse cx="450" cy="120" rx="80" ry="50" fill="url(#stateGrad)" stroke="#1565c0" stroke-width="3"/>
  <text x="450" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#0d47a1">Unused</text>
  <text x="450" y="135" text-anchor="middle" font-size="12" fill="#555">借用计数 = 0</text>
  
  <!-- Shared State -->
  <ellipse cx="200" cy="300" rx="90" ry="60" fill="url(#activeGrad)" stroke="#ef6c00" stroke-width="3"/>
  <text x="200" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#e65100">Shared(n)</text>
  <text x="200" y="315" text-anchor="middle" font-size="12" fill="#555">n个不可变借用</text>
  
  <!-- Exclusive State -->
  <ellipse cx="700" cy="300" rx="90" ry="60" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
  <text x="700" y="295" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a148c">Exclusive</text>
  <text x="700" y="315" text-anchor="middle" font-size="12" fill="#555">1个可变借用</text>
  
  <!-- Panic State -->
  <ellipse cx="450" cy="500" rx="80" ry="45" fill="url(#errorGrad)" stroke="#c62828" stroke-width="3"/>
  <text x="450" y="495" text-anchor="middle" font-size="16" font-weight="bold" fill="#b71c1c">Panic!</text>
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="#555">运行时错误</text>
  
  <!-- Transitions -->
  
  <!-- Unused -> Shared -->
  <path d="M 380 150 Q 280 200 220 250" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="270" y="190" font-size="12" fill="#2e7d32">borrow()</text>
  
  <!-- Unused -> Exclusive -->
  <path d="M 520 150 Q 620 200 680 250" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="190" font-size="12" fill="#2e7d32">borrow_mut()</text>
  
  <!-- Shared -> Shared (self loop) -->
  <path d="M 110 300 Q 80 250 110 200 Q 140 150 200 150 Q 260 150 290 200 Q 320 250 290 300" fill="none" stroke="#2196f3" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="120" y="180" font-size="11" fill="#1565c0">borrow() [n+1]</text>
  
  <!-- Shared -> Unused -->
  <path d="M 250 360 Q 320 400 400 420" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="320" y="410" font-size="11" fill="#555">drop(Ref) [n=1]</text>
  
  <!-- Shared -> Shared (decrement) -->
  <path d="M 150 350 Q 100 400 120 450 Q 140 480 170 480 Q 200 480 220 450" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="80" y="420" font-size="11" fill="#555">drop(Ref) [n>1]</text>
  
  <!-- Exclusive -> Unused -->
  <path d="M 650 360 Q 580 400 500 420" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="580" y="410" font-size="11" fill="#555">drop(RefMut)</text>
  
  <!-- Shared -> Panic -->
  <path d="M 240 350 Q 300 420 380 470" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="270" y="430" font-size="11" fill="#c62828">borrow_mut()</text>
  
  <!-- Exclusive -> Panic -->
  <path d="M 660 350 Q 600 420 520 470" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="590" y="430" font-size="11" fill="#c62828">borrow() / borrow_mut()</text>
  
  <!-- Legend -->
  <rect x="50" y="520" width="800" height="70" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="545" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">状态说明</text>
  
  <rect x="80" y="555" width="15" height="15" fill="url(#stateGrad)" stroke="#1565c0"/>
  <text x="105" y="567" font-size="12" fill="#555">初始状态</text>
  
  <rect x="200" y="555" width="15" height="15" fill="url(#activeGrad)" stroke="#ef6c00"/>
  <text x="225" y="567" font-size="12" fill="#555">活跃借用</text>
  
  <rect x="340" y="555" width="15" height="15" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="365" y="567" font-size="12" fill="#555">独占借用</text>
  
  <rect x="480" y="555" width="15" height="15" fill="url(#errorGrad)" stroke="#c62828"/>
  <text x="505" y="567" font-size="12" fill="#555">运行时Panic</text>
  
  <line x1="650" y1="562" x2="680" y2="562" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="690" y="567" font-size="12" fill="#555">成功转换</text>
  
  <line x1="750" y1="562" x2="780" y2="562" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="790" y="567" font-size="12" fill="#555">错误路径</text>
</svg>
