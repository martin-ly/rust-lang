<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="lifetimeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#0d47a1">生命周期分析：词法作用域 vs 非词法生命周期</text>
  
  <!-- Code Example -->
  <rect x="50" y="60" width="400" height="200" rx="8" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/>
  <text x="70" y="85" font-family="Consolas, monospace" font-size="12" fill="#2e7d32" font-weight="bold">fn example() {</text>
  <text x="70" y="105" font-family="Consolas, monospace" font-size="12" fill="#1565c0">  let mut data = vec![1, 2, 3];</text>
  <text x="70" y="125" font-family="Consolas, monospace" font-size="12" fill="#1565c0">  let slice = &amp;data[..];</text>
  <text x="70" y="165" font-family="Consolas, monospace" font-size="12" fill="#6a1b9a">  println!("{:?}", slice);</text>
  <text x="70" y="205" font-family="Consolas, monospace" font-size="12" fill="#d84315" font-weight="bold">  data.push(4); // NLL允许！</text>
  <text x="70" y="225" font-family="Consolas, monospace" font-size="12" fill="#2e7d32" font-weight="bold">}</text>
    
  <text x="250" y="250" text-anchor="middle" font-size="11" fill="#555">代码示例</text>
  
  <!-- Lexical Lifetimes (Left) -->
  <text x="550" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">词法作用域 (NLL之前)</text>
  
  <rect x="480" y="100" width="140" height="280" rx="5" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="550" y="125" text-anchor="middle" font-size="12" fill="#b71c1c">函数作用域</text>
  
  <!-- data lifetime -->
  <rect x="490" y="140" width="120" height="220" rx="3" fill="url(#lifetimeGrad)" stroke="#1565c0" stroke-width="2"/>
  <text x="550" y="160" text-anchor="middle" font-size="11" fill="#0d47a1">data: Vec</text>
  
  <!-- slice lifetime (lexical) -->
  <rect x="505" y="180" width="90" height="160" rx="3" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="550" y="200" text-anchor="middle" font-size="11" fill="#e65100">slice: &amp;[i32]</text>
  <text x="550" y="220" text-anchor="middle" font-size="10" fill="#f57c00">(到作用域结束)</text>
  
  <!-- Problem indicator -->
  <text x="550" y="300" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">❌ 编译失败</text>
  <text x="550" y="320" text-anchor="middle" font-size="10" fill="#c62828">data.push() 与</text>
  <text x="550" y="335" text-anchor="middle" font-size="10" fill="#c62828">slice借用冲突</text>
  
  <!-- NLL (Right) -->
  <text x="750" y="80" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">非词法生命周期 (NLL)</text>
  
  <rect x="680" y="100" width="140" height="280" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="750" y="125" text-anchor="middle" font-size="12" fill="#1b5e20">函数作用域</text>
  
  <!-- data lifetime -->
  <rect x="690" y="140" width="120" height="220" rx="3" fill="url(#lifetimeGrad)" stroke="#1565c0" stroke-width="2"/>
  <text x="750" y="160" text-anchor="middle" font-size="11" fill="#0d47a1">data: Vec</text>
  
  <!-- slice lifetime (NLL) -->
  <rect x="705" y="180" width="90" height="60" rx="3" fill="#fff3e0" stroke="#4caf50" stroke-width="2"/>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#2e7d32">slice: &amp;[i32]</text>
  <text x="750" y="220" text-anchor="middle" font-size="10" fill="#4caf50">(到println结束)</text>
  
  <!-- After slice ends -->
  <rect x="705" y="250" width="90" height="100" rx="3" fill="#e8f5e9" stroke="#81c784" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="750" y="285" text-anchor="middle" font-size="10" fill="#388e3c">✓ slice已结束</text>
  <text x="750" y="305" text-anchor="middle" font-size="10" fill="#388e3c">data.push() OK</text>
  
  <!-- Success indicator -->
  <text x="750" y="365" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="bold">✓ 编译通过</text>
  <text x="750" y="385" text-anchor="middle" font-size="10" fill="#2e7d32">精确数据流分析</text>
  
  <!-- Legend -->
  <rect x="50" y="400" width="800" height="80" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">图例说明</text>
  
  <rect x="80" y="445" width="30" height="20" rx="3" fill="url(#lifetimeGrad)" stroke="#1565c0"/>
  <text x="120" y="460" font-size="12" fill="#333">所有者生命周期</text>
  
  <rect x="260" y="445" width="30" height="20" rx="3" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="300" y="460" font-size="12" fill="#333">借用生命周期</text>
  
  <line x1="450" y1="455" x2="480" y2="455" stroke="#c62828" stroke-width="2"/>
  <text x="490" y="460" font-size="12" fill="#333">冲突</text>
  
  <line x1="580" y1="455" x2="610" y2="455" stroke="#4caf50" stroke-width="2"/>
  <text x="620" y="460" font-size="12" fill="#333">允许</text>
  
  <text x="450" y="475" text-anchor="middle" font-size="11" fill="#666">
    NLL基于数据流分析确定借用的实际最后使用点，而非词法作用域结束
  </text>
</svg>
