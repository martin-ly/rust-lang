<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      .box { rx: 5; }
      .start { fill: #2e7d32; }
      .process { fill: #1565c0; }
      .decision { fill: #ef6c00; }
      .end { fill: #c62828; }
      .text { font-family: Arial, sans-serif; font-size: 13px; fill: #ffffff; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 11px; fill: #333333; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; fill: #1565c0; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa"/>

  <text x="450" y="25" class="title">借用检查器工作流程</text>

  <!-- Start -->
  <rect x="380" y="50" width="140" height="40" class="box start"/>
  <text x="450" y="75" text-anchor="middle" class="text">开始编译</text>

  <!-- Arrow down -->
  <line x1="450" y1="90" x2="450" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Parse source -->
  <rect x="350" y="120" width="200" height="50" class="box process"/>
  <text x="450" y="140" text-anchor="middle" class="text">词法/语法分析</text>
  <text x="450" y="160" text-anchor="middle" class="text" font-size="11">生成 AST + 作用域树</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Build MIR -->
  <rect x="350" y="200" width="200" height="50" class="box process"/>
  <text x="450" y="220" text-anchor="middle" class="text">构建 MIR</text>
  <text x="450" y="240" text-anchor="middle" class="text" font-size="11">中间表示 + 控制流图</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Borrow check -->
  <rect x="350" y="280" width="200" height="50" class="box decision"/>
  <text x="450" y="300" text-anchor="middle" class="text">借用检查 (NLL)</text>
  <text x="450" y="320" text-anchor="middle" class="text" font-size="11">数据流分析 + 区域推理</text>

  <!-- Arrows to results -->
  <line x1="450" y1="330" x2="450" y2="360" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision diamond -->
  <polygon points="450,360 520,390 450,420 380,390" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
  <text x="450" y="395" text-anchor="middle" class="text" font-size="12">检查通过?</text>

  <!-- No branch -->
  <line x1="380" y1="390" x2="250" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="380" text-anchor="middle" class="label">否</text>

  <!-- Yes branch -->
  <line x1="520" y1="390" x2="650" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="600" y="380" text-anchor="middle" class="label">是</text>

  <!-- Error path -->
  <rect x="100" y="360" width="150" height="60" class="box end"/>
  <text x="175" y="385" text-anchor="middle" class="text">编译错误</text>
  <text x="175" y="405" text-anchor="middle" class="text" font-size="11">报告借用冲突</text>

  <!-- Arrow down from error -->
  <line x1="175" y1="420" x2="175" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Fix code -->
  <rect x="100" y="450" width="150" height="40" class="box process"/>
  <text x="175" y="475" text-anchor="middle" class="text">修复代码</text>

  <!-- Arrow back to start -->
  <path d="M 100 470 Q 50 470 50 250 Q 50 70 380 70" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Success path -->
  <rect x="650" y="360" width="150" height="60" class="box start"/>
  <text x="725" y="385" text-anchor="middle" class="text">编译成功</text>
  <text x="725" y="405" text-anchor="middle" class="text" font-size="11">继续代码生成</text>

  <!-- Legend -->
  <g transform="translate(650, 450)">
    <rect x="0" y="0" width="20" height="15" class="start"/>
    <text x="30" y="12" class="label">开始/结束</text>
    <rect x="0" y="25" width="20" height="15" class="process"/>
    <text x="30" y="37" class="label">处理步骤</text>
    <rect x="0" y="50" width="20" height="15" class="decision"/>
    <text x="30" y="62" class="label">决策点</text>
  </g>

  <!-- Annotations -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" class="label" font-weight="bold">关键组件:</text>
    <text x="0" y="20" class="label">• Region Inference</text>
    <text x="0" y="40" class="label">• Loan Analysis</text>
    <text x="0" y="60" class="label">• Flow-sensitive Check</text>
  </g>
</svg>
