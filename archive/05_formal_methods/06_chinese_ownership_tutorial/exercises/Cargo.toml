[package]
name = "rust-ownership-exercises"
version = "0.1.0"
edition = "2024"
rust-version = "1.96.0"
authors = ["Rust Learning Community"]
description = "Archived Rust ownership exercises"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/rust-lang-learning"

[dependencies]
# 自引用结构支持
ouroboros = { version = "0.18.5", optional = true }
# 异步支持
tokio = { version = "1.52.3", features = ["full", "test-util"] }

[features]
default = ["ouroboros"]

# 独立workspace，不继承父项目
[workspace]

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "ownership_patterns"
harness = false
