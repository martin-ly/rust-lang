    # - 实际状态: candle-core 0.10.2 与 libp2p 0.56.0 均为当前最新稳定版
    # - 上游状态: 等待 huggingface/candle 与 libp2p/rust-libp2p 迁移出 paste
    # [已由 cargo-vet 覆盖/管理] paste 1.0.15 已在 supply-chain/audits.toml 中登记审计 stub
    "RUSTSEC-2024-0436",

    # RUSTSEC-2023-0089: atomic-polyfill 不再维护
    # 影响评估: LOW（仅 ARM 嵌入式 target 的深层传递依赖）
