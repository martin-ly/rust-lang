# Cargo Audit 配置文件
# 本文件记录已知且暂时无法修复的安全警告和废弃依赖
# 每个忽略项都必须包含明确的影响评估和理由（见下方注释）

[advisories]
ignore = [
    # RUSTSEC-2023-0071: rsa - Marvin Attack timing sidechannel
    # 影响评估: MEDIUM -> LOW（本项目已移除 sqlx mysql feature，rsa 不再编译）
    # - 攻击向量: 需要攻击者能进行高精度的网络计时测量
    # - 影响范围: 仅影响 MySQL 后端的 RSA 密钥操作
    # - 实际状态: 本项目不再编译 rsa crate（sqlx-mysql 依赖已被移除）
    # - 上游状态: RustCrypto/RSA 修复工作进行中，无稳定补丁版本（截至 2026-05-29）
    "RUSTSEC-2023-0071",

    # RUSTSEC-2026-0118: hickory-proto - NSEC3 closest-encloser proof validation unbounded loop
    # 影响评估: LOW
    # - 攻击向量: 需要恶意的 DNS 响应跨区欺骗
    # - 影响范围: 仅影响 libp2p-mdns 子 crate（本项目未启用 mdns feature）
    # - 实际状态: hickory-proto 0.25.2 仅存在于 Cargo.lock 残留中，不在编译依赖树
    # - 上游状态: libp2p 0.56.0 已是最新版，等待 libp2p >0.56.0 升级内部依赖
    "RUSTSEC-2026-0118",

    # RUSTSEC-2026-0119: hickory-proto - 相关 DNS 漏洞
    # 影响评估: LOW（同上，hickory-proto 0.25.2 不在实际编译依赖树中）
    "RUSTSEC-2026-0119",
]

# 废弃依赖警告（unmaintained）
# 以下依赖已被标记为 unmaintained，但暂无替代方案或上游未升级。
# cargo audit 的 unmaintained 警告无法通过 ignore 完全消除，此处记录供跟踪：
#
# - atomic-polyfill (RUSTSEC-2023-0089): postcard 1.1.3 -> heapless 0.7.17 传递依赖
#   影响: LOW（dev-dependency only，仅 benchmark 使用）
#   计划: 跟踪 postcard/heapless 上游升级
#
# - bare-metal (RUSTSEC-2026-0110): cortex-m 0.7.7 传递依赖
#   影响: LOW（嵌入式 target only，host 编译不使用）
#   计划: cortex-m 0.8+ 将移除 bare-metal，但 0.8 尚未发布稳定版
#
# - instant (RUSTSEC-2024-0384): glommio 0.9.0 -> futures-lite 1.13.0 -> fastrand 1.9.0 传递依赖
#   影响: LOW（glommio 实验性模块使用）
#   计划: 跟踪 glommio/futures-lite 上游升级
#
# - paste: gemm 系列 -> paste 传递依赖
#   影响: LOW（dev-dependency only，candle-core benchmark 使用）
#   计划: gemm/candle-core 上游升级
