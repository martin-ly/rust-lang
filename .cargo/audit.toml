# Cargo Audit 配置文件
#
# 自 2026-07-04 起，cargo-vet 已成为本项目主要的供应链治理工具。
# supply-chain/config.toml 与 supply-chain/audits.toml 共同覆盖所有 registry 依赖；
# 本文件保留的 RUSTSEC 忽略作为已知且暂时无法修复的安全/废弃警告记录。
#
# 每个忽略项都必须包含明确的影响评估和理由（见下方注释）。
# 忽略不代表问题不存在，而是因为：
#   1) 相关 crate 为深层传递依赖，本项目代码不直接使用；
#   2) 上游未发布修复版本，或升级会导致破坏性 API 变更/生态不兼容；
#   3) 攻击向量在本项目的教学示例场景下难以触发或影响可控。

[advisories]
ignore = [
    # RUSTSEC-2023-0071: rsa - Marvin Attack timing sidechannel
    # 影响评估: MEDIUM -> LOW（本项目已移除 sqlx mysql feature，rsa 不再编译）
    # - 攻击向量: 需要攻击者能进行高精度的网络计时测量
    # - 影响范围: 仅影响 MySQL 后端的 RSA 密钥操作
    # - 实际状态: 本项目不再编译 rsa crate（sqlx-mysql 依赖已被移除）
    # - 上游状态: RustCrypto/RSA 修复工作进行中，无稳定补丁版本（截至 2026-05-29）
    # [已由 cargo-vet 覆盖/管理] rsa 已从 Cargo.lock 移除，不再进入依赖树
    "RUSTSEC-2023-0071",

    # RUSTSEC-2026-0118: hickory-proto - NSEC3 closest-encloser proof validation unbounded loop
    # 影响评估: LOW
    # - 攻击向量: 需要恶意的 DNS 响应跨区欺骗
    # - 影响范围: 仅影响 libp2p-mdns 子 crate（本项目未启用 mdns feature）
    # - 实际状态: hickory-proto 0.25.2 仅存在于 Cargo.lock 残留中，不在编译依赖树
    # - 上游状态: libp2p 0.56.0 已是最新版，等待 libp2p >0.56.0 升级内部依赖
    # [已由 cargo-vet 覆盖/管理] hickory-proto 0.25.2 已在 supply-chain/audits.toml 中登记审计 stub
    "RUSTSEC-2026-0118",

    # RUSTSEC-2026-0119: hickory-proto - 相关 DNS 漏洞
    # 影响评估: LOW（同上，hickory-proto 0.25.2 不在实际编译依赖树中）
    # [已由 cargo-vet 覆盖/管理] hickory-proto 0.25.2 已在 supply-chain/audits.toml 中登记审计 stub
    "RUSTSEC-2026-0119",

    # RUSTSEC-2026-0110: bare-metal 已弃用
    # 影响评估: LOW（仅 ARM 嵌入式 target 使用，host 编译不编译）
    # - 攻击向量: 不适用（bare-metal 是底层目标抽象库，非网络/加密组件）
    # - 影响范围: 仅 c13_embedded 在 target_arch = "arm" 时依赖 cortex-m 0.7.7
    # - 实际状态: cortex-m 0.7.7 是 crates.io 最新稳定版；cortex-m 0.8 尚未发布
    # - 上游状态: 等待 rust-embedded/cortex-m 发布 0.8
    # [已由 cargo-vet 覆盖/管理] bare-metal 0.2.5 已在 supply-chain/audits.toml 中登记审计 stub
    "RUSTSEC-2026-0110",

    # RUSTSEC-2024-0384: `instant` 不再维护
    # 影响评估: LOW（仅 Linux 下 glommio 实验性模块使用）
    # - 攻击向量: 不适用（instant 是时间工具库）
    # - 影响范围: c06_async 的 glommio 0.9.0 -> futures-lite 1.13.0
    # - 实际状态: glommio 0.9.0 是 crates.io 最新版；移除 glommio 将损失 io_uring 教学内容
    # - 上游状态: 等待 glommio 升级至 futures-lite 2.x
    # [已由 cargo-vet 覆盖/管理] instant 0.1.13 已在 supply-chain/audits.toml 中登记审计 stub
    "RUSTSEC-2024-0384",

    # RUSTSEC-2026-0194: quick-xml - 检查重复属性名时二次时间复杂度
    # 影响评估: MEDIUM -> LOW（传递依赖，非默认编译路径）
    # - 攻击向量: 需要解析攻击者控制的 XML 文档
    # - 影响范围: quick-xml 0.39.4，由 typespec 1.0.0 与 wayland-scanner 0.31.10 引入
    # - 实际状态:
    #     * c10_networks 的 Azure SDK 已升级至 1.0.0，将 quick-xml 从 0.38.4 推到 0.39.4
    #     * c16_gui 的 egui/eframe 已升级至 0.35.0
    #     * 但 typespec 1.0.0 与 wayland-scanner 0.31.10 仍锁定 quick-xml ^0.39
    # - 上游状态:
    #     * typespec git main (1.1.0-beta.1) 已升级到 quick-xml 0.41.0，但 crates.io 稳定版未发布
    #     * wayland-scanner git master 仍使用 quick-xml 0.40，尚未修复
    # - 触发条件:
    #     * typespec: 仅在启用 c10_networks 的 azure-sdk feature 时进入编译依赖树
    #     * wayland-scanner: 仅在 Linux 平台且启用 eframe Wayland 支持时编译
    # [待上游发布 stable 后移除] 上游 crates.io 暂无修复版本
    "RUSTSEC-2026-0194",

    # RUSTSEC-2026-0195: quick-xml - NsReader 命名空间声明无界分配导致 DoS
