    # - 攻击向量/影响范围/实际状态/上游状态/触发条件 同上
    # [待上游发布 stable 后移除] 上游 crates.io 暂无修复版本
    "RUSTSEC-2026-0195",

    # RUSTSEC-2024-0436: paste 不再维护
