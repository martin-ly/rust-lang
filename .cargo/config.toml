[build]
# 使用sccache加速构建
rustc-wrapper = "sccache"

# 为IDE和命令行使用不同的target目录
# (避免RUSTFLAGS变化导致缓存失效)
target-dir = "target"

[registries.crates-io]
protocol = "sparse"

[net]
retry = 3

[profile.dev.build-override]
opt-level = 1

[profile.release.build-override]
opt-level = 2

# 启用增量编译优化
[unstable]
incremental-parallel = true
