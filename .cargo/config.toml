[build]
# 使用sccache加速构建 - 需要安装: cargo install sccache
# sccache 支持磁盘缓存和远程缓存(S3/Azure/GCS等)
rustc-wrapper = "sccache"
# 通用Rustflags优化
# - Ctarget-cpu=native: 针对本机CPU优化
# - Cembed-bitcode=no: 禁用bitcode嵌入(加快编译)
rustflags = ["-C", "target-cpu=native", "-C", "embed-bitcode=no"]

# 并行编译作业数 - 默认为CPU核心数，可以显式设置
# 建议: 物理核心数 - 1，保留一个核心给系统
# jobs = 16

[env]
# sccache 配置 - 50GB 缓存大小
SCCACHE_CACHE_SIZE = "50G"
# Miri 默认使用 Tree Borrows 模型
MIRIFLAGS = { value = "-Zmiri-tree-borrows -Zmiri-disable-isolation", force = false }
# Windows 缓存目录 (使用绝对路径避免解析问题)
SCCACHE_DIR = "D:\\_cache\\sccache"
# Linux/macOS 缓存目录 (取消注释使用)
# SCCACHE_DIR = { value = "${HOME}/.cache/sccache", relative = false }
# 启用 GitHub Actions 缓存支持
# 注意: 只在 CI 环境 (GitHub Actions) 中设为 true
# 本地开发应设为 false 或使用环境变量覆盖
SCCACHE_GHA_ENABLED = { value = "false", force = false }

# 链接器优化 - 使用更快的链接器 (Windows)
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# 链接器优化 - 使用更快的链接器 (Linux)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# 链接器优化 - macOS
[target.x86_64-apple-darwin]
linker = "clang"

[target.aarch64-apple-darwin]
linker = "clang"

[registries.crates-io]
# 稀疏索引协议 - 大幅减少索引下载时间
protocol = "sparse"

[net]
# 网络重试配置
retry = 3
# 使用Git CLI fetch (对于大型仓库更快)
git-fetch-with-cli = true

# 启用流水线编译 - 在稳定版1.70+可用
[pipeline]
enabled = true

# ============ Profile 优化 ============
# 注意: 以下 profile 仅补充 Cargo.toml 中未定义或需要本地覆盖的配置。
# [profile.release] 已统一由 Cargo.toml 管理，如需本地快速发布构建请使用:
#   cargo build --profile release-fast

[profile.dev]
# 增量编译 - 必须启用
incremental = true
# 优化级别 0 = 最快编译速度
opt-level = 0
# 调试信息 - 1 = line-tables-only (更快)
debug = 1
debug-assertions = true
overflow-checks = true
# 代码生成单元 - 更多=更快编译
codegen-units = 256
# 使用 unwind panic
panic = "unwind"
# Rust 1.96: 开发环境也使用分割调试信息
split-debuginfo = "unpacked"

[profile.dev.build-override]
# 构建依赖的优化级别
opt-level = 1
codegen-units = 16

# 更快的检查 Profile - 用于快速语法检查
[profile.check-fast]
inherits = "dev"
opt-level = 0
debug = 0
codegen-units = 1024
panic = "abort"
incremental = true

[profile.test]
# 测试优化 - 平衡速度和调试
opt-level = 1
debug = 1
codegen-units = 256
incremental = true
# 注意: test profile 不支持 panic 设置，使用默认 unwind

[profile.bench]
# 基准测试
opt-level = 3
debug = false
lto = "thin"
codegen-units = 4

[profile.bench.build-override]
opt-level = 2

# ============ Rust 1.96 稳定特性 ============
# 注意: 以下特性已在 Rust 1.96 稳定，无需unstable配置:
# - 稀疏索引 (已稳定)
# - 流水线编译 (已稳定)
# - split-debuginfo (已稳定)

# ============ 未来unstable特性 (可选) ============
# 要启用以下特性，取消注释并运行: rustup default nightly
# [unstable]
# check-cfg = true
#
# [profile.dev]
# codegen-backend = "cranelift"

# ============ Miri 配置 ============
# Miri 是 Rust 的未定义行为检测工具
# 运行方式: cargo miri test
# 
# 环境变量选项:
# - MIRIFLAGS="-Zmiri-tree-borrows"  使用 Tree Borrows 模型 (推荐)
# - MIRIFLAGS="-Zmiri-tag-raw-pointers"  标记裸指针
# - MIRIFLAGS="-Zmiri-disable-isolation"  禁用隔离

# Miri 测试 runner 配置
[target.x86_64-unknown-linux-gnu.miri]
runner = "miri"

[target.x86_64-pc-windows-msvc.miri]
runner = "miri"

[target.x86_64-apple-darwin.miri]
runner = "miri"

[target.aarch64-apple-darwin.miri]
runner = "miri"

# Miri 特定环境变量 (已合并到 [env] 部分)
