[build]
# 使用sccache加速构建 - 需要安装: cargo install sccache
# sccache 支持磁盘缓存和远程缓存(S3/Azure/GCS等)
# rustc-wrapper = "sccache"  # 注意: Windows 下需先手动启动 sccache 服务器 (SCCACHE_SERVER_PORT=4226 sccache --start-server)
# 通用Rustflags优化
# - Ctarget-cpu=native: 针对本机CPU优化
# - Cembed-bitcode=no: 禁用bitcode嵌入(加快编译)
rustflags = ["-C", "target-cpu=native", "--cfg", "tokio_unstable"]

# 并行编译作业数 - 默认为CPU核心数，可以显式设置
# 建议: 物理核心数 - 1，保留一个核心给系统
# jobs = 16

[env]
SCCACHE_SERVER_PORT = "4226"

# sccache 配置 - 50GB 缓存大小
SCCACHE_CACHE_SIZE = "50G"
# Miri 实验性 Tree Borrows 模型（非默认，需显式启用）
MIRIFLAGS = { value = "-Zmiri-tree-borrows -Zmiri-disable-isolation", force = false }
# Windows 缓存目录 (使用绝对路径避免解析问题)
SCCACHE_DIR = "D:\\_cache\\sccache"
# Linux/macOS 缓存目录 (取消注释使用)
# SCCACHE_DIR = { value = "${HOME}/.cache/sccache", relative = false }
# 启用 GitHub Actions 缓存支持
# 注意: 只在 CI 环境 (GitHub Actions) 中设为 true
# 本地开发应设为 false 或使用环境变量覆盖
SCCACHE_GHA_ENABLED = { value = "false", force = false }

# 链接器优化 - 使用更快的链接器 (Windows)
# 注意: rust-lld.exe 本身就是 LLD 链接器，不需要 -fuse-ld=lld 参数
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# 链接器优化 - 使用更快的链接器 (Linux)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# 链接器优化 - macOS
[target.x86_64-apple-darwin]
linker = "clang"

[target.aarch64-apple-darwin]
linker = "clang"

[registries.crates-io]
# 稀疏索引协议 - 大幅减少索引下载时间
protocol = "sparse"

[net]
# 网络重试配置
retry = 3
# 使用Git CLI fetch (对于大型仓库更快)
git-fetch-with-cli = true

# 启用流水线编译 - 在稳定版1.70+可用
[pipeline]
enabled = true

# ============ Resolver 配置 ============
# 允许 cargo update 选择需要更高 Rust 版本的依赖版本
# 注意: 开发时使用 nightly toolchain，不限制为 rust-version 声明的 MSRV
# 如需严格遵守 MSRV，注释掉此行即可恢复默认行为
[resolver]
incompatible-rust-versions = "allow"

# ============ Profile 优化 ============
# 注意: 所有 profile 已统一由根 Cargo.toml 管理。
# .cargo/config.toml 中不再重复定义，避免配置覆盖导致的不一致。
# 如需本地覆盖，请复制 config.toml.local.template 为 config.toml.local 并自定义。
#
# 可用 profile 列表:
#   cargo build --profile dev          (默认，开发编译)
#   cargo build --profile release      (发布，最大优化)
#   cargo build --profile release-fast (快速发布，thin LTO)
#   cargo build --profile size         (最小体积)
#   cargo check --profile check-fast   (超快速语法检查)
#   cargo test  --profile test         (测试优化)
#   cargo bench --profile bench        (基准测试)
#
# [profile.release] 已统一由 Cargo.toml 管理，如需本地快速发布构建请使用:
#   cargo build --profile release-fast

# 本地 profile 覆盖示例 (如需使用，取消下方注释):
# [profile.dev]
# split-debuginfo = "unpacked"
#
# [profile.dev.build-override]
# opt-level = 1
# codegen-units = 16

# ============ 已稳定特性 ============
# 注意: 以下特性在较早版本已稳定，无需unstable配置:
# - 稀疏索引 (Rust 1.70+)
# - 流水线编译 (Rust 1.70+)
# - split-debuginfo (平台相关，较早版本已支持)

# ============ 未来unstable特性 (可选) ============
# 要启用以下特性，取消注释并运行: rustup default nightly
# [unstable]
# check-cfg = true
#
# [profile.dev]
# codegen-backend = "cranelift"

# ============ Miri 配置 ============
# Miri 是 Rust 的未定义行为检测工具
# 运行方式: cargo miri test
# 
# 环境变量选项:
# - MIRIFLAGS="-Zmiri-tree-borrows"  使用 Tree Borrows 模型 (实验性，非默认)
# - MIRIFLAGS="-Zmiri-tag-raw-pointers"  标记裸指针
# - MIRIFLAGS="-Zmiri-disable-isolation"  禁用隔离

# Miri 测试 runner 配置
[target.x86_64-unknown-linux-gnu.miri]
runner = "miri"

[target.x86_64-pc-windows-msvc.miri]
runner = "miri"

[target.x86_64-apple-darwin.miri]
runner = "miri"

[target.aarch64-apple-darwin.miri]
runner = "miri"

# Miri 特定环境变量 (已合并到 [env] 部分)
