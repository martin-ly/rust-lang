# cargo-deny 供应链安全策略文件
# 参考: https://embarkstudios.github.io/cargo-deny/index.html
# 维护者: rust-lang 知识体系项目组
# 更新日期: 2026-05-18
# cargo-deny 版本: 0.18.4

[graph]
# 不启用 all-features，按默认 feature 检查
all-features = false
no-default-features = false

[output]
feature-depth = 1

# =============================================================================
# 1. 漏洞响应策略 ( Advisories )
# =============================================================================
[advisories]
# 漏洞数据库来源
#db-path = "$CARGO_HOME/advisory-dbs"
#db-urls = ["https://github.com/RustSec/advisory-db"]

# 已知漏洞的例外处理（带到期日审查注释）
ignore = [
    # --- glommio 传递依赖 (instant) ---
    # 根因: glommio → futures-lite → fastrand → instant
    # 计划: glommio 升级或替换后自动消除
    # 到期审查: 2026-08-01
    { id = "RUSTSEC-2024-0384", reason = "通过 glommio → futures-lite → fastrand → instant 传递引入; 需等待 glommio 上游升级" },

    # 注: RUSTSEC-2022-0041/2026-0002 已通过移除 bastion/tokio-console 依赖修复 (2026-05-18)
    # 注: RUSTSEC-2026-0118/0119 已不在当前 advisory-db 中（hickory-proto 0.26.1 已修复 workspace 直接依赖）
]

# =============================================================================
# 2. 许可证策略 ( Licenses )
# =============================================================================
[licenses]
# 允许的开源许可证白名单
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "LGPL-3.0",
    "CDLA-Permissive-2.0",
]

confidence-threshold = 0.8

# 许可证澄清（cargo-deny 无法自动识别的特殊许可证）
[[licenses.clarify]]
crate = "ring"
expression = "ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = false
registries = []

# =============================================================================
# 3. 禁止使用的 Crate ( Bans )
# =============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# 明确禁止直接依赖的 crate（存在已知安全问题或有更好的替代）
deny = [
    { name = "fxhash",   reason = "unmaintained; 使用 workspace 声明的 ahash 替代" },
    { name = "paste",    reason = "unmaintained; 使用 quote 宏或手写替代" },
    { name = "atty",     reason = "有安全漏洞; 使用 workspace 声明的 is-terminal 替代" },
    { name = "bincode",  reason = "unmaintained (RUSTSEC-2025-0141); 使用 postcard 替代" },
    { name = "rustls-pemfile", reason = "unmaintained (RUSTSEC-2025-0134); 使用 rustls-pki-types::pem::PemObject 替代" },
    # instant 已通过 advisory ignore 跟踪 (RUSTSEC-2024-0384); 作为 glommio 传递依赖无法直接移除
]

# 允许特定 crate 的多个版本（当传递依赖冲突不可避免时）
skip = [
    { crate = "fastrand",         version = "1.9.0", reason = "glommio 传递引入旧版" },
    { crate = "futures-lite",     version = "1.13.0", reason = "glommio 传递引入旧版" },
    { crate = "windows-sys",      version = "0.52.0", reason = "传递依赖多版本共存" },
]

# =============================================================================
# 4. Crate 来源限制 ( Sources )
# =============================================================================
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
