[package]
name = "embassy-demo"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
authors = ["Rust Embedded Learning Community"]
description = "Embassy async framework demo for Raspberry Pi Pico (RP2040)"
license = "MIT OR Apache-2.0"

[dependencies]
# Embassy 异步运行时
embassy-executor = { version = "0.10.0", features = ["task-arena-size-32768", "arch-cortex-m", "executor-thread", "defmt"] }
embassy-time = { version = "0.5.1", features = ["defmt", "defmt-timestamp-uptime"] }
embassy-rp = { version = "0.10.0", features = ["defmt", "unstable-pac", "time-driver", "critical-section-impl", "rom-func-cache"] }

# 调试与日志
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

# 嵌入式基础
cortex-m = { version = "0.7.7", features = ["inline-asm"] }
cortex-m-rt = "0.7.5"

# 关键段实现（ embassy-rp 依赖）
critical-section = "1.2.0"

# 可移植原子操作（RP2040 是单核，但某些库依赖）
portable-atomic = { version = "1.13.1", features = ["critical-section"] }

[profile.release]
debug = 2
lto = true
opt-level = 'z'

[package.metadata.cargo-machete]
ignored = ["cortex-m", "cortex-m-rt", "critical-section", "portable-atomic"]
