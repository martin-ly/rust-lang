[package]
name = "common"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.1"
authors = ["Rust Learning Community"]
description = "Shared common library for Rust learning modules - traits, errors, and utilities"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/rust-lang-learning"

[features]
default = ["std", "serde", "error-trait", "async", "tracing"]
std = []
alloc = []
serde = ["dep:serde", "dep:serde_json"]
error-trait = ["dep:thiserror", "dep:anyhow"]
async = ["dep:tokio", "dep:futures"]
tracing = ["dep:tracing", "dep:tracing-subscriber"]
full = ["std", "alloc", "serde", "error-trait", "async", "tracing"]

[dependencies]
# 序列化
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

# 错误处理
thiserror = { workspace = true, optional = true }
anyhow = { workspace = true, optional = true }

# 异步
futures = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

# 日志和追踪
tracing = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }

# 常用工具
uuid = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }

[lib]
name = "common"
path = "src/lib.rs"
