[package]
name = "common"
version = "0.1.0"
edition = "2024"
rust-version = "1.96.0"
authors = ["Rust Learning Community"]
keywords = ["utilities", "error-handling", "learning"]
categories = ["development-tools::testing"]
description = "Common utilities for Rust learning modules"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rust-lang/rust-lang-learning"

[dependencies]
tokio = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
anyhow = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[lib]
name = "common"
path = "src/lib.rs"

[[bench]]
name = "common_benchmarks"
harness = false

[features]
default = ["error-trait", "async"]
serde = ["dep:serde", "dep:serde_json"]
error-trait = ["dep:thiserror", "dep:anyhow"]
async = ["dep:tokio"]

[lints.clippy]
manual_div_ceil = "deny"

[package.metadata.cargo-machete]
ignored = ["anyhow", "serde_json"]
