[package]
name = "common"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
keywords = ["utilities", "error-handling", "learning"]
categories = ["development-tools::testing"]
description = "Common utilities for Rust learning modules"
license.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
tokio = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
anyhow = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[lib]
name = "common"
path = "src/lib.rs"

[[bench]]
name = "common_benchmarks"
harness = false

[features]
default = ["error-trait", "async"]
serde = ["dep:serde", "dep:serde_json"]
error-trait = ["dep:thiserror", "dep:anyhow"]
async = ["dep:tokio"]

[lints.clippy]
manual_div_ceil = "deny"

[package.metadata.cargo-machete]
ignored = ["anyhow", "serde_json"]
