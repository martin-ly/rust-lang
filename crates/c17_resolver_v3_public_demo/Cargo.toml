[package]
name = "c17_resolver_v3_public_demo"
version = "0.1.0"
edition = "2024"
rust-version = "1.96.1"
license = "MIT OR Apache-2.0"
authors = ["Rust Learning Community"]
description = "Demonstration of resolver v3 and public = true for dependency feature unification"
keywords = ["cargo", "resolver", "public-dependency", "feature-unification"]
categories = ["development-tools::cargo-plugins", "rust-patterns"]
publish = false

[dependencies]
crate-b = { path = "crate-b" }
crate-c = { path = "crate-c" }
crate-d = { path = "crate-d", features = ["serde"] }

[lints.rust]
missing_docs = "allow"

[[bin]]
name = "resolver_v3_public_demo"
path = "src/main.rs"
