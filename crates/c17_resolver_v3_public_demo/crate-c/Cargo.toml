[package]
name = "crate-c"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Crate C: publicly depends on crate-d with the alloc feature"
publish = false

[dependencies]
# 注意: `public = true` 目前仍是 nightly-only 特性（需 `-Zpublic-dependency`），
# 稳定版 cargo 会忽略该字段并发出警告，因此这里以注释形式保留演示意图：
# crate-d = { path = "../crate-d", features = ["alloc"], public = true }
crate-d = { path = "../crate-d", features = ["alloc"] }

[lints.rust]
missing_docs = "allow"
