[package]
name = "legacy-lib"
version.workspace = true
edition = "2021"
rust-version = "1.70"
description = "模拟旧组件：MSRV 1.70，公开 bitflags 类型，内部使用 serde/indexmap"
license.workspace = true

[dependencies]
bitflags = { workspace = true, public = true }
serde = { workspace = true, public = false, features = ["derive"] }
indexmap = { workspace = true, public = false }

# 本 crate 属于 examples/resolver_v3_practice workspace，不在此处声明 [workspace]。
