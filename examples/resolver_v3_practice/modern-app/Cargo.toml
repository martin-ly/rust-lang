[package]
name = "modern-app"
version.workspace = true
edition = "2021"
rust-version = "1.84"
description = "模拟新组件：MSRV 1.84，通过公共依赖复用 legacy-lib/bitflags/serde"
license.workspace = true

[lib]
name = "modern_app"

[[bin]]
name = "modern-app"
path = "src/main.rs"

[dependencies]
legacy-lib = { path = "../legacy-lib", public = true }
bitflags = { workspace = true, public = true }
serde = { workspace = true, public = true, features = ["derive", "std"] }
indexmap = { workspace = true, public = false }

# 本 crate 属于 examples/resolver_v3_practice workspace，不在此处声明 [workspace]。
