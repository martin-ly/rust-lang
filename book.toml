[book]
title = "Rust 分层概念知识体系"
authors = ["Rust Concept Knowledge Base Team"]
description = "Rust 分层概念知识体系 — 从入门直觉到形式化验证"
src = "concept"
build-dir = "book"
language = "zh"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
mathjax-support = true
copy-fonts = true
additional-js = ["theme/mermaid-init.js"]

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true

# [preprocessor.toc]
# command = "mdbook-toc"
# marker = "<!-- toc -->"
# NOTE: mdbook-toc v0.15.4 is INCOMPATIBLE with mdbook v0.4.52.
# It fails with "Unable to parse the input" even on minimal books
# (single file, no toc markers). Upstream regression; tracked at
# https://github.com/badboy/mdbook-toc/issues. Disabled until fix.
# No files in this project use <!-- toc --> markers.

[output.html.fold]
enable = true
level = 1
